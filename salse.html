<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>강북도매 유/무선 실적 V18.3</title>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDgTFfUykzYpLy21gYV3T6Yz3qJckqEwsQ",
  authDomain: "sales-dashboard-e7a79.firebaseapp.com",
  databaseURL: "https://sales-dashboard-e7a79-default-rtdb.firebaseio.com",
  projectId: "sales-dashboard-e7a79"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
</script>

<style>
body{font-family:Arial;background:#f4f6fb;padding:20px;}
button{padding:10px;margin:5px;}
table{width:100%;border-collapse:collapse;}
td,th{border:1px solid #ccc;padding:6px;text-align:center;}
</style>

</head>
<body>

<h2>강북도매 실적</h2>

<button onclick="openCenter('서대문')">서대문</button>
<button onclick="openCenter('의정부')">의정부</button>
<button onclick="openCenter('고양')">고양</button>

<table>
<thead><tr><th>센터</th><th>무선</th><th>유선</th></tr></thead>
<tbody id="tb"></tbody>
</table>

<div id="popup" style="display:none;">
<input id="w" placeholder="무선">
<input id="l" placeholder="유선">
<button onclick="save()">저장</button>
</div>

<script>
let cache={}
let cur=""

function getData(c){return cache["c_"+c]||{}}

function render(){
 let html=""
 Object.keys(cache).forEach(k=>{
  let c=k.replace("c_","")
  let d=cache[k]
  html+=`<tr><td>${c}</td><td>${d.w||0}</td><td>${d.l||0}</td></tr>`
 })
 document.getElementById("tb").innerHTML=html
}

function load(){
 db.ref().on("value",s=>{
  cache=s.val()||{}
  render()
 })
}

function openCenter(c){
 cur=c
 let d=getData(c)
 w.value=d.w||""
 l.value=d.l||""
 popup.style.display="block"
}

function save(){
 db.ref("c_"+cur).set({
  w:Number(w.value||0),
  l:Number(l.value||0)
 })
 popup.style.display="none"
}

load()
</script>

</body>
</html>
