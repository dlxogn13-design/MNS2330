
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>센터 입력</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<div class="nav">
<button onclick="location.href='sales.html'">← 센터</button>
<button onclick="location.href='index.html'">🏠 메인</button>
</div>

<h2 id="title"></h2>

<div class="grid2">
<div><label>무선</label><input id="wireless"></div>
<div><label>MNP</label><input id="mnp"></div>
<div><label>중고</label><input id="used"></div>
<div><label>유선</label><input id="wired"></div>
<div><label>약갱</label><input id="renew"></div>
</div>

<br>
<button onclick="save()">저장</button>

</div>

<script>
let center=localStorage.getItem("center")
document.getElementById("title").innerText=center+" 입력"

let data=JSON.parse(localStorage.getItem("sales")||"{}")

function save(){

let prev=data[center]?.now||{}

data[center]={
prev:prev,
now:{
wireless:+wireless.value||0,
mnp:+mnp.value||0,
used:+used.value||0,
wired:+wired.value||0,
renew:+renew.value||0
}
}

localStorage.setItem("sales",JSON.stringify(data))
alert("저장 완료")
location.href="sales.html"
}
</script>

</body>
</html>
