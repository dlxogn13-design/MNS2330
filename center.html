
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>센터 입력</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="nav">
<button onclick="history.back()">← 센터</button>
<button onclick="location.href='index.html'">🏠 메인</button>
</div>

<h2 id="title"></h2>

<div class="form-grid">
<div><label>무선</label><input id="wireless"></div>
<div><label>MNP</label><input id="mnp"></div>
<div><label>중고</label><input id="used"></div>
<div><label>유선</label><input id="wired"></div>
</div>

<div class="single">
<label>약정갱신</label>
<input id="renew">
</div>

<button onclick="save()">저장</button>

<script>

let center=new URLSearchParams(location.search).get("c")
document.getElementById("title").innerText=center+" 입력"

function save(){

let data={
w:Number(wireless.value||0),
m:Number(mnp.value||0),
u:Number(used.value||0),
l:Number(wired.value||0),
r:Number(renew.value||0)
}

localStorage.setItem(center,JSON.stringify(data))

alert("저장 완료")

}

</script>

</body>
</html>
