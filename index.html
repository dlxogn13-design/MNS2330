<style>
body{

.header{

.card{

<script>

// 오늘 날짜 표시
const d = new Date();
const y = d.getFullYear();
const m = String(d.getMonth()+1).padStart(2,'0');
const day = String(d.getDate()).padStart(2,'0');

document.getElementById("today").innerText = y+"-"+m+"-"+day;

</script>
