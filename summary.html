
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>요약 실적</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<div class="nav">
<button onclick="location.href='sales.html'">← 센터</button>
<button onclick="location.href='index.html'">🏠 메인</button>
</div>

<h2>강북도매 유/무선 실적</h2>

<table id="tbl">

<tr>
<th>센터</th>
<th>무선실적</th>
<th>MNP</th>
<th>중고</th>
<th>유선</th>
<th>약갱</th>
</tr>

</table>

</div>

<script>

let centers=["서대문","의정부","고양","구리","노원","광진","강릉","원주","춘천"]

let data=JSON.parse(localStorage.getItem("sales")||"{}")

let html=`
<tr>
<th>센터</th>
<th>무선</th>
<th>MNP</th>
<th>중고</th>
<th>유선</th>
<th>약갱</th>
</tr>
`

centers.forEach(c=>{

let d=data[c]||{wireless:0,mnp:0,used:0,wired:0,renew:0}

html+=`
<tr>
<td>${c}</td>
<td>${d.wireless}</td>
<td>${d.mnp}</td>
<td>${d.used}</td>
<td>${d.wired}</td>
<td>${d.renew}</td>
</tr>
`
})

document.getElementById("tbl").innerHTML=html

</script>

</body>
</html>
