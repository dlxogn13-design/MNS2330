  if(model && !d.model.includes(model)) return;
  if(color && !d.color.includes(color)) return;
  if(branch && !d.branch.includes(branch)) return;
  if(store && !d.store.includes(store)) return;

  let key = d.branch+d.store+d.model+d.color;

  if(!map[key]) map[key]={branch:d.branch,store:d.store,model:d.model,color:d.color,self:0,other:0};

  if(d.type=="자사") map[key].self += d.qty;
  else map[key].other += d.qty;
 });

 render(map);
}

function topStores(){
 const model = document.getElementById("model").value.toUpperCase();

 let map={};

 data.forEach(d=>{
   if(model && !d.model.includes(model)) return;

   if(!map[d.store]) map[d.store]={store:d.store,self:0,other:0};

   if(d.type=="자사") map[d.store].self += d.qty;
   else map[d.store].other += d.qty;
 });

 let arr = Object.values(map).map(r=>({
   store:r.store,
   self:r.self,
   other:r.other,
   total:r.self+r.other
 }));

 arr.sort((a,b)=>b.total-a.total);

 const tbody=document.getElementById("result");
 tbody.innerHTML="";

 arr.slice(0,20).forEach(r=>{
  let tr=`<tr>
  <td>-</td>
  <td>${r.store}</td>
  <td>${model}</td>
  <td>-</td>
  <td>${r.self}</td>
  <td>${r.other}</td>
  </tr>`;
  tbody.innerHTML+=tr;
 });
}

function render(map){
 const tbody=document.getElementById("result");
 tbody.innerHTML="";

 Object.values(map).forEach(r=>{
  let tr=`<tr>
  <td>${r.branch}</td>
  <td>${r.store}</td>
  <td>${r.model}</td>
  <td>${r.color}</td>
  <td>${r.self}</td>
  <td>${r.other}</td>
  </tr>`;
  tbody.innerHTML+=tr;
 });
}

</script>
