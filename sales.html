<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>강북도매 유/무선 실적 FINAL</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<style>
body{font-family:Arial;background:#f4f6fb;padding:20px;}
.topbar{display:flex;justify-content:flex-end;gap:10px;}
.centerGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:20px 0;max-width:420px;}
.centerGrid button{background:#eef1f7;font-weight:bold;padding:10px;border:1px solid #ccc;border-radius:6px;}
table{width:100%;border-collapse:collapse;margin-top:15px;font-size:13px;}
th{background:#0f2345;color:white;padding:8px;}
td{border-bottom:1px solid #ddd;padding:6px;text-align:center;}
.popup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
background:white;padding:20px;border-radius:10px;display:none;}
.popup input{width:120px;margin-bottom:6px;}
</style>
</head>

<body>

<div class="topbar">
<button onclick="resetData()">초기화</button>
</div>

<h2>강북도매 유/무선 실적 (실시간 공유)</h2>

<div class="centerGrid" id="grid"></div>

<table id="tbl">
<thead>
<tr>
<th>센터</th>
<th>무선</th><th>증분</th>
<th>유선</th><th>증분</th>
</tr>
</thead>
<tbody></tbody>
</table>

<div class="popup" id="popup">
<h3 id="title"></h3>
<input id="w" placeholder="무선">
<input id="l" placeholder="유선">
<button onclick="save()">저장</button>
<button onclick="popup.style.display='none'">닫기</button>
</div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyDgTFfUykzYpLy21gYV3T6Yz3qJckqEwsQ",
  authDomain: "sales-dashboard-e7a79.firebaseapp.com",
  databaseURL: "https://sales-dashboard-e7a79-default-rtdb.firebaseio.com",
  projectId: "sales-dashboard-e7a79",
  storageBucket: "sales-dashboard-e7a79.firebasestorage.app",
  messagingSenderId: "459408318",
  appId: "1:459408318:web:372eaa04b01ff18bb2afef"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const centers=["서대문","의정부","고양","구리","노원","광진","강릉","원주","춘천"]

let data={}

function init(){
 let g=document.getElementById("grid")
 centers.forEach(c=>{
  let b=document.createElement("button")
  b.innerText=c
  b.onclick=()=>open(c)
  g.appendChild(b)
 })

 db.ref("centers").on("value",snap=>{
  data=snap.val()||{}
  render()
 })
}

function get(c){return data[c]||{}}

function render(){
 let tb=document.querySelector("#tbl tbody")
 tb.innerHTML=""

 centers.forEach(c=>{
  let s=get(c)
  let incW=(s.w||0)-(s.prevW||0)
  let incL=(s.l||0)-(s.prevL||0)

  tb.innerHTML+=`
  <tr>
    <td>${c}</td>
    <td>${s.w||0}</td>
    <td>${incW}</td>
    <td>${s.l||0}</td>
    <td>${incL}</td>
  </tr>`
 })
}

let cur=""

function open(c){
 cur=c
 let s=get(c)
 w.value=s.w||""
 l.value=s.l||""
 title.innerText=c
 popup.style.display="block"
}

function save(){
 let prev=get(cur)
 db.ref("centers/"+cur).set({
  w:Number(w.value||0),
  prevW:prev.w||0,
  l:Number(l.value||0),
  prevL:prev.l||0
 })
 popup.style.display="none"
}

function resetData(){
 db.ref("centers").set(null)
}

init()

</script>

</body>
</html>
