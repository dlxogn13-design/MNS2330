
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>강북도매 유/무선 실적</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body{font-family:Arial;background:#f4f6fb;padding:20px;}
button{padding:8px 14px;border-radius:6px;border:1px solid #ccc;background:white;cursor:pointer;}
.centerGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:20px 0;max-width:420px;}
.centerGrid button{background:#eef1f7;font-weight:bold;}
table{width:100%;border-collapse:collapse;margin-top:15px;font-size:13px;}
th{background:#0f2345;color:white;padding:8px;}
td{border-bottom:1px solid #ddd;padding:6px;text-align:center;}
.rankTop{background:#d9e8ff;}
.rankLow{background:#ffd9d9;}
.warn{color:red;font-weight:bold;}
.groupRow{background:#eef3ff;font-weight:bold;}
.popup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:white;border-radius:10px;padding:20px;box-shadow:0 5px 20px rgba(0,0,0,0.2);display:none;width:260px;}
.popup input{width:100%;margin-bottom:8px;padding:6px;}
</style>
</head>

<body>

<button onclick="location.href='index.html'">메인</button>
<button onclick="history.back()">뒤로</button>

<h2>강북도매 유/무선 실적</h2>

<div class="centerGrid">
<button onclick="openCenter('서대문')">서대문</button>
<button onclick="openCenter('의정부')">의정부</button>
<button onclick="openCenter('고양')">고양</button>
<button onclick="openCenter('구리')">구리</button>
<button onclick="openCenter('노원')">노원</button>
<button onclick="openCenter('광진')">광진</button>
<button onclick="openCenter('강릉')">강릉</button>
<button onclick="openCenter('원주')">원주</button>
<button onclick="openCenter('춘천')">춘천</button>
</div>

<table id="salesTable">
<thead>
<tr>
<th>완료</th>
<th>센터</th>
<th>무선목표</th>
<th>실적</th>
<th>달성율</th>
<th>순위</th>
<th>증분</th>
<th>MNP</th>
<th>비중</th>
<th>중고</th>
<th>비중</th>
<th>유선목표</th>
<th>실적</th>
<th>달성율</th>
<th>순위</th>
<th>증분</th>
<th>약갱</th>
</tr>
</thead>
<tbody></tbody>
</table>

<div class="popup" id="centerPopup">
<h3 id="popupCenter"></h3>
<input id="wireless" placeholder="무선실적">
<input id="mnp" placeholder="MNP">
<input id="used" placeholder="중고">
<input id="wired" placeholder="유선실적">
<input id="renew" placeholder="약갱">
<button onclick="saveCenter()">저장</button>
<button onclick="closePopup()">닫기</button>
</div>

<script>

const centers=["서대문","의정부","고양","구리","노원","광진","강릉","원주","춘천"]
const gangbuk=["서대문","의정부","고양","구리","노원","광진"]
const gangwon=["강릉","원주","춘천"]

let targets={}

function init(){

fetch("target.xlsx")
.then(r=>r.arrayBuffer())
.then(data=>{

let wb=XLSX.read(data)

let wireless=XLSX.utils.sheet_to_json(wb.Sheets["무선목표"])
let wired=XLSX.utils.sheet_to_json(wb.Sheets["유선목표"])

wireless.forEach(r=>{
targets[r["센터"]]={wireless:r["목표"]||0}
})

wired.forEach(r=>{
if(!targets[r["센터"]]) targets[r["센터"]]={}
targets[r["센터"]].wired=r["목표"]||0
})

render()

})

}

function render(){

let tbody=document.querySelector("#salesTable tbody")
tbody.innerHTML=""

let group={
gangbukWireless:0,
gangbukTarget:0,
gangwonWireless:0,
gangwonTarget:0
}

centers.forEach(c=>{

let saved=JSON.parse(localStorage.getItem("center_"+c)||"{}")

let wireless=saved.wireless*1||0
let wired=saved.wired*1||0
let mnp=saved.mnp*1||0
let used=saved.used*1||0
let renew=saved.renew*1||0

let wTarget=(targets[c]?.wireless)||0
let wiTarget=(targets[c]?.wired)||0

if(gangbuk.includes(c)){
group.gangbukWireless+=wireless
group.gangbukTarget+=wTarget
}else{
group.gangwonWireless+=wireless
group.gangwonTarget+=wTarget
}

})

let gangbukAch=group.gangbukTarget?(group.gangbukWireless/group.gangbukTarget*100):0
let gangwonAch=group.gangwonTarget?(group.gangwonWireless/group.gangwonTarget*100):0

tbody.innerHTML+=`
<tr class="groupRow">
<td></td>
<td>강북도매계</td>
<td>${group.gangbukTarget}</td>
<td>${group.gangbukWireless}</td>
<td>${gangbukAch.toFixed(0)}%</td>
<td></td><td></td><td></td><td></td><td></td><td></td>
<td></td><td></td><td></td><td></td><td></td><td></td>
</tr>
`

tbody.innerHTML+=`
<tr class="groupRow">
<td></td>
<td>강원상권계</td>
<td>${group.gangwonTarget}</td>
<td>${group.gangwonWireless}</td>
<td>${gangwonAch.toFixed(0)}%</td>
<td></td><td></td><td></td><td></td><td></td><td></td>
<td></td><td></td><td></td><td></td><td></td><td></td>
</tr>
`

centers.forEach(c=>{

let saved=JSON.parse(localStorage.getItem("center_"+c)||"{}")

let wireless=saved.wireless*1||0
let wired=saved.wired*1||0
let mnp=saved.mnp*1||0
let used=saved.used*1||0
let renew=saved.renew*1||0

let wTarget=(targets[c]?.wireless)||0
let wiTarget=(targets[c]?.wired)||0

let wAch=wTarget?(wireless/wTarget*100):0
let wiAch=wiTarget?(wired/wiTarget*100):0

tbody.innerHTML+=`
<tr>
<td>${(wireless||wired||mnp||used||renew)?"✔":""}</td>
<td>${c}</td>
<td>${wTarget}</td>
<td>${wireless}</td>
<td>${wAch.toFixed(0)}%</td>
<td></td>
<td></td>
<td>${mnp}</td>
<td>${wireless?(mnp/wireless*100).toFixed(0):0}%</td>
<td>${used}</td>
<td>${wireless?(used/wireless*100).toFixed(0):0}%</td>
<td>${wiTarget}</td>
<td>${wired}</td>
<td>${wiAch.toFixed(0)}%</td>
<td></td>
<td></td>
<td>${renew}</td>
</tr>`

})

}

let currentCenter=""

function openCenter(name){

currentCenter=name

let saved=JSON.parse(localStorage.getItem("center_"+name)||"{}")

document.getElementById("wireless").value=saved.wireless||""
document.getElementById("mnp").value=saved.mnp||""
document.getElementById("used").value=saved.used||""
document.getElementById("wired").value=saved.wired||""
document.getElementById("renew").value=saved.renew||""

document.getElementById("popupCenter").innerText=name
document.getElementById("centerPopup").style.display="block"

}

function closePopup(){
document.getElementById("centerPopup").style.display="none"
}

function saveCenter(){

let data={
wireless:document.getElementById("wireless").value,
mnp:document.getElementById("mnp").value,
used:document.getElementById("used").value,
wired:document.getElementById("wired").value,
renew:document.getElementById("renew").value
}

localStorage.setItem("center_"+currentCenter,JSON.stringify(data))

closePopup()
render()

}

init()

</script>

</body>
</html>
