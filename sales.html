<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>강북도매 유/무선 실적</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<style>
body{font-family:Arial;background:#fff;padding:20px;color:#111;font-weight:700;font-size:18px;}

.topbar{display:flex;gap:10px;margin-bottom:12px;}
button{padding:10px 14px;border-radius:6px;border:1px solid #ccc;background:#eef1f7;font-size:16px;font-weight:700;}

.centerGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:18px 0;}
.centerGrid button{
 background:#1e3a8a;color:#fff;border:none;
 font-size:22px;font-weight:800;padding:14px;
}

table{width:100%;border-collapse:collapse;font-size:20px;}
th,td{
 text-align:center;
 padding:16px;
 border-right:1px solid #bbb;
 white-space:nowrap;
}

th{
 background:#0f2345;
 color:#fff;
 font-size:21px;
}

/* 무선 / 유선 구분선 */
td:nth-child(10),
th:nth-child(10){
 border-left:4px solid #000;
}

.rankTop{background:#dbeafe;}
.rankLow{background:#fee2e2;}
.group{background:#e5e7eb;font-weight:800;}

.signal{width:14px;height:14px;border-radius:50%;margin:auto;}
.green{background:#22c55e;}
.yellow{background:#facc15;}
.red{background:#ef4444;}

/* 🔥 트랙 확대 */
.track{
 height:60px;
 background:#ddd;
 border-radius:30px;
 position:relative;
 margin:18px 0;
}

.finish{
 position:absolute;
 left:66%;
 top:0;
 bottom:0;
 width:8px;
 background:repeating-linear-gradient(45deg,black,black 5px,white 5px,white 10px);
}

.runner{
 position:absolute;
 top:-28px;
 text-align:center;
 font-size:36px; /* 🔥 사람 크게 */
 font-weight:bold;
}
.runner span{
 display:block;
 font-size:20px; /* 🔥 % 크게 */
}

.popup{
 position:fixed;
 top:50%;
 left:50%;
 transform:translate(-50%,-50%);
 background:white;
 padding:20px;
 border-radius:10px;
 display:none;
}
input{width:140px;margin:6px 0;padding:8px;font-size:16px;}
</style>
</head>

<body>

<div class="topbar">
<button onclick="location.href='index.html'">메인가기</button>
<button onclick="location.reload()">새로고침</button>
<button onclick="adminReset()">초기화</button>
</div>

<div class="centerGrid" id="btns"></div>

<h2>강북도매 유/무선 실적</h2>
<h3 id="titleTime"></h3>

<table id="tbl">
<thead>
<tr>
<th></th><th>센터</th>
<th>무선목표</th><th>무선</th><th>달성율</th><th>순위</th><th>증분</th>
<th>MNP</th><th>비중</th>
<th>유선목표</th><th>유선</th><th>달성율</th><th>순위</th><th>증분</th>
<th>약갱</th>
</tr>
</thead>
<tbody></tbody>
</table>

<h3>진행 트랙</h3>

<div>무선</div>
<div class="track">
<div class="finish"></div>
<div id="rw" class="runner"><span id="pw"></span>🏃‍➡️</div>
</div>

<div>유선</div>
<div class="track">
<div class="finish"></div>
<div id="rl" class="runner"><span id="pl"></span>🏃‍➡️</div>
</div>

<div class="popup" id="popup">
<h3 id="pTitle"></h3>
<input id="w" placeholder="무선">
<input id="m" placeholder="MNP">
<input id="l" placeholder="유선">
<input id="r" placeholder="약갱">
<br>
<button onclick="save()">저장</button>
<button onclick="popup.style.display='none'">닫기</button>
</div>

<script>
/* 🔒 JS 원본 그대로 유지 */
</script>

</body>
</html>
