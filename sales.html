<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>강북도매 유/무선 실적 V18.3</title>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDgTFfUykzYpLy21gYV3T6Yz3qJckqEwsQ",
  authDomain: "sales-dashboard-e7a79.firebaseapp.com",
  databaseURL: "https://sales-dashboard-e7a79-default-rtdb.firebaseio.com",
  projectId: "sales-dashboard-e7a79"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
</script>

<style>
body{font-family:Arial;background:#f4f6fb;padding:20px;}
.centerGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:20px 0;max-width:420px;}
.centerGrid button{padding:10px;}
table{width:100%;border-collapse:collapse;}
td,th{border:1px solid #ccc;padding:6px;text-align:center;}
.popup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:white;padding:20px;display:none;}
</style>
</head>

<body>

<h2>강북도매 실적</h2>

<div class="centerGrid">
<button onclick="openCenter('서대문')">서대문</button>
<button onclick="openCenter('의정부')">의정부</button>
<button onclick="openCenter('고양')">고양</button>
<button onclick="openCenter('구리')">구리</button>
<button onclick="openCenter('노원')">노원</button>
<button onclick="openCenter('광진')">광진</button>
<button onclick="openCenter('강릉')">강릉</button>
<button onclick="openCenter('원주')">원주</button>
<button onclick="openCenter('춘천')">춘천</button>
</div>

<table>
<thead>
<tr><th>센터</th><th>무선</th><th>유선</th></tr>
</thead>
<tbody id="tb"></tbody>
</table>

<div class="popup" id="popup">
<input id="w" placeholder="무선"><br>
<input id="l" placeholder="유선"><br>
<button onclick="save()">저장</button>
</div>

<script>
const centers=["서대문","의정부","고양","구리","노원","광진","강릉","원주","춘천"]

let cache={}
let cur=""

function getData(c){ return cache["c_"+c] || {} }

function render(){
 let html=""
 centers.forEach(c=>{
  let d=getData(c)
  html+=`<tr><td>${c}</td><td>${d.w||0}</td><td>${d.l||0}</td></tr>`
 })
 document.getElementById("tb").innerHTML=html
}

function loadData(){
 db.ref().on("value",snap=>{
  cache=snap.val()||{}
  render()
 })
}

function openCenter(c){
 cur=c
 let d=getData(c)
 w.value=d.w||""
 l.value=d.l||""
 popup.style.display="block"
}

function save(){
 db.ref("c_"+cur).set({
  w:Number(w.value||0),
  l:Number(l.value||0)
 })
 popup.style.display="none"
}

loadData()
</script>

</body>
</html>
