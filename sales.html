
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>강북도매 유/무선 실적</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body{font-family:Arial;background:#f4f6fb;padding:20px;}
.centerGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:20px 0;max-width:420px;}
.centerGrid button{background:#eef1f7;font-weight:bold;padding:10px;border:1px solid #ccc;border-radius:6px;cursor:pointer;}
table{width:100%;border-collapse:collapse;margin-top:15px;font-size:13px;}
th{background:#0f2345;color:white;padding:8px;}
td{border-bottom:1px solid #ddd;padding:6px;text-align:center;}
.groupRow{background:#eef3ff;font-weight:bold;}
.rankTop{background:#dbe9ff;}
.rankLow{background:#ffdede;}
.warn{color:red;font-weight:bold;}
.track{margin-top:25px;}
.trackBar{height:18px;background:#e2e6f0;border-radius:10px;margin:8px 0;position:relative;}
.runner{position:absolute;top:-6px;font-size:18px;}
.popup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
background:white;border-radius:10px;padding:20px;
box-shadow:0 5px 20px rgba(0,0,0,0.2);display:none;width:260px;}
.popup input{width:100%;margin-bottom:8px;padding:6px;}
</style>
</head>

<body>

<h2>강북도매 유/무선 실적</h2>

<div class="centerGrid">
<button onclick="openCenter('서대문')">서대문</button>
<button onclick="openCenter('의정부')">의정부</button>
<button onclick="openCenter('고양')">고양</button>
<button onclick="openCenter('구리')">구리</button>
<button onclick="openCenter('노원')">노원</button>
<button onclick="openCenter('광진')">광진</button>
<button onclick="openCenter('강릉')">강릉</button>
<button onclick="openCenter('원주')">원주</button>
<button onclick="openCenter('춘천')">춘천</button>
</div>

<table id="salesTable">
<thead>
<tr>
<th>완료</th>
<th>센터</th>
<th>무선목표</th>
<th>무선실적</th>
<th>달성율</th>
<th>순위</th>
<th>증분</th>
<th>MNP</th>
<th>비중</th>
<th>중고</th>
<th>비중</th>
<th>유선목표</th>
<th>유선실적</th>
<th>달성율</th>
<th>순위</th>
<th>증분</th>
<th>약갱</th>
</tr>
</thead>
<tbody></tbody>
</table>

<div class="track">
<b>강북도매 달성율 트랙</b>
무선
<div class="trackBar"><div class="runner" id="wirelessRunner">🏃</div></div>
유선
<div class="trackBar"><div class="runner" id="wiredRunner">🏃</div></div>
</div>

<div class="popup" id="centerPopup">
<h3 id="popupCenter"></h3>
<input id="wireless" placeholder="무선실적">
<input id="mnp" placeholder="MNP">
<input id="used" placeholder="중고">
<input id="wired" placeholder="유선실적">
<input id="renew" placeholder="약갱">
<button onclick="saveCenter()">저장</button>
<button onclick="closePopup()">닫기</button>
</div>

<script>

const centers=["서대문","의정부","고양","구리","노원","광진","강릉","원주","춘천"]
const gangbuk=["서대문","의정부","고양","구리","노원","광진"]
const gangwon=["강릉","원주","춘천"]

let targets={}

function todayKey(){
 let d=new Date()
 return (d.getMonth()+1)+"/"+d.getDate()
}

function init(){

fetch("target.xlsx")
.then(r=>r.arrayBuffer())
.then(data=>{

let wb=XLSX.read(data)
let today=todayKey()

let wirelessSheet=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]])
let wiredSheet=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[1]])

wirelessSheet.forEach(r=>{
targets[r["센터"]] = targets[r["센터"]] || {}
targets[r["센터"]].wireless = r[today] || 0
})

wiredSheet.forEach(r=>{
targets[r["센터"]] = targets[r["센터"]] || {}
targets[r["센터"]].wired = r[today] || 0
})

render()

})

}

function render(){

let tbody=document.querySelector("#salesTable tbody")
tbody.innerHTML=""

let wAch=[], lAch=[]
let totals={w:0,wt:0,l:0,lt:0}
let area={w:0,wt:0}
let gw={w:0,wt:0}

centers.forEach(c=>{

let s=JSON.parse(localStorage.getItem("center_"+c)||"{}")

let w=s.wireless*1||0
let l=s.wired*1||0
let wt=targets[c]?.wireless||0
let lt=targets[c]?.wired||0

let wa=wt? w/wt*100:0
let la=lt? l/lt*100:0

wAch.push({c,val:wa})
lAch.push({c,val:la})

totals.w+=w; totals.wt+=wt
totals.l+=l; totals.lt+=lt

if(gangbuk.includes(c)){area.w+=w; area.wt+=wt}
if(gangwon.includes(c)){gw.w+=w; gw.wt+=wt}

})

wAch.sort((a,b)=>b.val-a.val)
lAch.sort((a,b)=>b.val-a.val)

let wr={},lr={}
wAch.forEach((d,i)=>wr[d.c]=i+1)
lAch.forEach((d,i)=>lr[d.c]=i+1)

let totalAch=totals.wt?totals.w/totals.wt*100:0

tbody.innerHTML+=`
<tr class="groupRow"><td></td><td>강북도매계</td><td>${totals.wt}</td><td>${totals.w}</td><td>${totalAch.toFixed(0)}%</td><td colspan="12"></td></tr>
<tr class="groupRow"><td></td><td>강북상권계</td><td>${area.wt}</td><td>${area.w}</td><td>${(area.wt?area.w/area.wt*100:0).toFixed(0)}%</td><td colspan="12"></td></tr>
<tr class="groupRow"><td></td><td>강원상권계</td><td>${gw.wt}</td><td>${gw.w}</td><td>${(gw.wt?gw.w/gw.wt*100:0).toFixed(0)}%</td><td colspan="12"></td></tr>
`

centers.forEach(c=>{

let s=JSON.parse(localStorage.getItem("center_"+c)||"{}")
let p=JSON.parse(localStorage.getItem("prev_"+c)||"{}")

let w=s.wireless*1||0
let l=s.wired*1||0
let mnp=s.mnp*1||0
let used=s.used*1||0
let renew=s.renew*1||0

let wt=targets[c]?.wireless||0
let lt=targets[c]?.wired||0

let wa=wt? w/wt*100:0
let la=lt? l/lt*100:0

let row=`<tr>
<td>${(w||l||mnp||used||renew)?"✔️":""}</td>
<td>${c}</td>
<td>${wt}</td>
<td>${w}</td>
<td class="${wa<totalAch?'warn':''}">${wa.toFixed(0)}%</td>
<td class="${wr[c]<=2?'rankTop':(wr[c]>=8?'rankLow':'')}">${wr[c]}</td>
<td>${w-(p.wireless||0)}</td>
<td>${mnp}</td>
<td>${w?(mnp/w*100).toFixed(0):0}%</td>
<td>${used}</td>
<td>${w?(used/w*100).toFixed(0):0}%</td>
<td>${lt}</td>
<td>${l}</td>
<td class="${la<totalAch?'warn':''}">${la.toFixed(0)}%</td>
<td class="${lr[c]<=2?'rankTop':(lr[c]>=8?'rankLow':'')}">${lr[c]}</td>
<td>${l-(p.wired||0)}</td>
<td>${renew}</td>
</tr>`

tbody.innerHTML+=row

})

document.getElementById("wirelessRunner").style.left=Math.min(totalAch,100)+"%"
document.getElementById("wiredRunner").style.left=Math.min((totals.lt?totals.l/totals.lt*100:0),100)+"%"

}

let currentCenter=""

function openCenter(c){
currentCenter=c
let s=JSON.parse(localStorage.getItem("center_"+c)||"{}")
wireless.value=s.wireless||""
mnp.value=s.mnp||""
used.value=s.used||""
wired.value=s.wired||""
renew.value=s.renew||""
popupCenter.innerText=c
centerPopup.style.display="block"
}

function closePopup(){centerPopup.style.display="none"}

function saveCenter(){

let prev=JSON.parse(localStorage.getItem("center_"+currentCenter)||"{}")
localStorage.setItem("prev_"+currentCenter,JSON.stringify(prev))

let data={
wireless:wireless.value,
mnp:mnp.value,
used:used.value,
wired:wired.value,
renew:renew.value
}

localStorage.setItem("center_"+currentCenter,JSON.stringify(data))

closePopup()
render()

}

init()

</script>
</body>
</html>
