<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>강북도매 유/무선 실적 V18.3</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
body{font-family:Arial;background:#f4f6fb;padding:20px;}
.topbar{display:flex;justify-content:flex-end;gap:10px;margin-bottom:10px;}
.centerGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:20px 0;max-width:420px;}
.centerGrid button{background:#eef1f7;font-weight:bold;padding:10px;border:1px solid #ccc;border-radius:6px;}
table{width:100%;border-collapse:collapse;margin-top:15px;font-size:13px;}
th{background:#0f2345;color:white;padding:8px;}
td{border-bottom:1px solid #ddd;padding:6px;text-align:center;}
.group{background:#eef3ff;font-weight:bold;}
.rankTop{background:#dbe9ff;}
.rankLow{background:#ffdede;}
.track{position:relative;height:18px;background:#e2e6f0;border-radius:10px;margin:10px 0;}
.finish{position:absolute;right:0;width:4px;height:100%;background:red;}
.runner{position:absolute;top:-4px;font-size:18px;white-space:nowrap;}
.popup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:white;padding:20px;border-radius:10px;display:none;}
.popup input{width:150px;margin-bottom:8px;padding:6px;}
</style>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyDgTFfUykzYpLy21gYV3T6Yz3qJckqEwsQ",
  authDomain: "sales-dashboard-e7a79.firebaseapp.com",
  databaseURL: "https://sales-dashboard-e7a79-default-rtdb.firebaseio.com",
  projectId: "sales-dashboard-e7a79",
  storageBucket: "sales-dashboard-e7a79.firebasestorage.app",
  messagingSenderId: "459408318",
  appId: "1:459408318:web:372eaa04b01ff18bb2afef"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
</script>

</head>
<body>

<div class="topbar">
<button onclick="resetData()">초기화</button>
<button onclick="location.href='index.html'">메인가기</button>
</div>

<h2>강북도매 유/무선 실적</h2>

<div class="centerGrid">
<button onclick="openCenter('서대문')">서대문</button>
<button onclick="openCenter('의정부')">의정부</button>
<button onclick="openCenter('고양')">고양</button>
<button onclick="openCenter('구리')">구리</button>
<button onclick="openCenter('노원')">노원</button>
<button onclick="openCenter('광진')">광진</button>
<button onclick="openCenter('강릉')">강릉</button>
<button onclick="openCenter('원주')">원주</button>
<button onclick="openCenter('춘천')">춘천</button>
</div>

<table id="tbl">
<thead>
<tr>
<th>완료</th><th>센터</th>
<th>무선목표</th><th>무선실적</th><th>달성율</th><th>순위</th><th>증분</th>
<th>MNP</th><th>비중</th><th>중고</th><th>비중</th>
<th>유선목표</th><th>유선실적</th><th>달성율</th><th>순위</th><th>증분</th>
<th>약갱</th>
</tr>
</thead>
<tbody></tbody>
</table>

<h3>강북도매 달성율 트랙</h3>
<div>무선</div>
<div class="track"><div class="finish"></div><div id="rw" class="runner">🏃‍➡️ 0%</div></div>
<div>유선</div>
<div class="track"><div class="finish"></div><div id="rl" class="runner">🏃‍➡️ 0%</div></div>

<div class="popup" id="popup">
<h3 id="pTitle"></h3>
<input id="w" placeholder="무선">
<input id="m" placeholder="MNP">
<input id="u" placeholder="중고">
<input id="l" placeholder="유선">
<input id="r" placeholder="약갱">
<button onclick="save()">저장</button>
<button onclick="popup.style.display='none'">닫기</button>
</div>

<script>
const centers=["서대문","의정부","고양","구리","노원","광진","강릉","원주","춘천"]
const gangbuk=["서대문","의정부","고양","구리","노원","광진"]
const gangwon=["강릉","원주","춘천"]
let targets={}

function today(){let d=new Date();return (d.getMonth()+1)+"/"+d.getDate()}

function formatDate(v){
  if(v instanceof Date) return (v.getMonth()+1)+"/"+v.getDate()
  if(typeof v==="number"){let d=XLSX.SSF.parse_date_code(v); if(d) return d.m+"/"+d.d}
  return String(v).trim()
}

async function loadTargets(){
let res=await fetch("target.xlsx")
let buf=await res.arrayBuffer()
let wb=XLSX.read(buf)

let wsW=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1})
let wsL=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[1]],{header:1})

let t=today(), col=-1
wsW[0].forEach((v,i)=>{ if(formatDate(v)===t){col=i} })

centers.forEach(c=>{
 let rowW=wsW.find(r=>String(r[0]).trim()==c)
 let rowL=wsL.find(r=>String(r[0]).trim()==c)
 targets[c]={ w:rowW?Number(rowW[col]||0):0, l:rowL?Number(rowL[col]||0):0 }
})
render()
}

function getData(c){ return JSON.parse((()=>null)("c_"+c)||"{}") }

function sum(list){
 let o={w:0,l:0,m:0,u:0,r:0,wt:0,lt:0,incW:0,incL:0}
 list.forEach(c=>{
  let s=getData(c)
  o.w+=Number(s.w||0); o.l+=Number(s.l||0)
  o.m+=Number(s.m||0); o.u+=Number(s.u||0); o.r+=Number(s.r||0)
  o.wt+=Number(targets[c]?.w||0); o.lt+=Number(targets[c]?.l||0)
  o.incW += (Number(s.w||0) - Number(s.prevW||0))
  o.incL += (Number(s.l||0) - Number(s.prevL||0))
 })
 return o
}

function render(){
 let tb=document.querySelector("#tbl tbody"); tb.innerHTML=""

 let gAll=sum(centers), gBuk=sum(gangbuk), gWon=sum(gangwon)

 // region ranking (무선 달성율 기준)
 let reg = [
   {name:"강북상권계", g:gBuk, val: gBuk.wt? gBuk.w/gBuk.wt:0},
   {name:"강원상권계", g:gWon, val: gWon.wt? gWon.w/gWon.wt:0}
 ].sort((a,b)=>b.val-a.val)
 let regRank = {}
 reg.forEach((r,i)=> regRank[r.name]=i+1)

 function gRow(name,g){
  let wa=g.wt?Math.round(g.w/g.wt*100):0
  let la=g.lt?Math.round(g.l/g.lt*100):0
  let rankClass = (regRank[name]==1?'rankTop':(regRank[name]==2?'':''))
  let rankText = (name==="강북상권계"||name==="강원상권계") ? (regRank[name]||'-') : '-'
  return "<tr class='group'>"+
  "<td></td><td>"+name+"</td>"+
  "<td>"+g.wt+"</td><td>"+g.w+"</td><td>"+wa+"%</td>"+
  "<td class='"+rankClass+"'>"+rankText+"</td>"+
  "<td>"+g.incW+"</td>"+
  "<td>"+g.m+"</td><td>"+(g.w?Math.round(g.m/g.w*100):0)+"%</td>"+
  "<td>"+g.u+"</td><td>"+(g.w?Math.round(g.u/g.w*100):0)+"%</td>"+
  "<td>"+g.lt+"</td><td>"+g.l+"</td><td>"+la+"%</td>"+
  "<td class='"+rankClass+"'>"+rankText+"</td>"+
  "<td>"+g.incL+"</td>"+
  "<td>"+g.r+"</td></tr>"
 }

 tb.innerHTML+=gRow("강북도매계",gAll)
 tb.innerHTML+=gRow("강북상권계",gBuk)
 tb.innerHTML+=gRow("강원상권계",gWon)

 let arr=[]
 centers.forEach(c=>{
  let s=getData(c)
  let w=s.w||0,l=s.l||0, wt=targets[c]?.w||0, lt=targets[c]?.l||0
  let wa=wt?w/wt*100:0, la=lt?l/lt*100:0
  arr.push({c,w,l,wt,lt,wa,la})
 })

 let wr=[...arr].sort((a,b)=>b.wa-a.wa)
 let lr=[...arr].sort((a,b)=>b.la-a.la)
 let wm={}, lm={}
 wr.forEach((r,i)=>wm[r.c]=i+1)
 lr.forEach((r,i)=>lm[r.c]=i+1)

 arr.forEach(d=>{
  let s=getData(d.c)
  let incW=(s.w||0)-(s.prevW||0)
  let incL=(s.l||0)-(s.prevL||0)

  let row="<tr>"
  row+="<td>"+(d.w||d.l?"✔️":"")+"</td>"
  row+="<td>"+d.c+"</td>"
  row+="<td>"+d.wt+"</td><td>"+d.w+"</td><td>"+Math.round(d.wa)+"%</td>"
  row+="<td class='"+(wm[d.c]<=2?"rankTop":(wm[d.c]>=8?"rankLow":""))+"'>"+wm[d.c]+"</td>"
  row+="<td>"+incW+"</td>"
  row+="<td>"+(s.m||0)+"</td><td>"+(d.w?Math.round((s.m||0)/d.w*100):0)+"%</td>"
  row+="<td>"+(s.u||0)+"</td><td>"+(d.w?Math.round((s.u||0)/d.w*100):0)+"%</td>"
  row+="<td>"+d.lt+"</td><td>"+d.l+"</td><td>"+Math.round(d.la)+"%</td>"
  row+="<td class='"+(lm[d.c]<=2?"rankTop":(lm[d.c]>=8?"rankLow":""))+"'>"+lm[d.c]+"</td>"
  row+="<td>"+incL+"</td>"
  row+="<td>"+(s.r||0)+"</td></tr>"
  tb.innerHTML+=row
 })

 let wPct=gAll.wt?Math.min(100,Math.round(gAll.w/gAll.wt*100)):0
 let lPct=gAll.lt?Math.min(100,Math.round(gAll.l/gAll.lt*100)):0
 rw.style.left=wPct+"%"; rw.innerText="🏃‍➡️ "+wPct+"%"
 rl.style.left=lPct+"%"; rl.innerText="🏃‍➡️ "+lPct+"%"
}

let cur=""
function openCenter(c){
 cur=c
 let s=getData(c)
 w.value=s.w||""; m.value=s.m||""; u.value=s.u||""; l.value=s.l||""; r.value=s.r||""
 pTitle.innerText=c
 popup.style.display="block"
}

function save(){
 let prev=getData(cur)
 let data={
  w:Number(w.value||0), prevW:prev.w||0,
  m:Number(m.value||0), u:Number(u.value||0),
  l:Number(l.value||0), prevL:prev.l||0,
  r:Number(r.value||0)
 }
 db.ref("c_"+cur,JSON.stringify(data))
 popup.style.display="none"
 render()
}

function resetData(){ localStorage.clear(); location.reload() }

loadTargets()
</script>

<script>
document.addEventListener("DOMContentLoaded", function() {
  const btn = document.getElementById("saveBtn");
  if(btn){
    btn.addEventListener("click", function(){
      if(typeof saveData === "function"){
        saveData();
      } else {
        alert("saveData 함수 없음");
      }
    });
  }
});
</script>


<script>
function saveData() {
  try {
    const center = document.querySelector("h2, #popupTitle, .popup-title")?.innerText || "unknown";

    const inputs = document.querySelectorAll("input");
    const data = {
      wireless: inputs[0]?.value || 0,
      mnp: inputs[1]?.value || 0,
      used: inputs[2]?.value || 0,
      wired: inputs[3]?.value || 0,
      etc: inputs[4]?.value || 0
    };

    if (!window.firebase || !window.firebase.database) {
      alert("Firebase 연결 안됨");
      return;
    }

    const db = firebase.database();

    db.ref("sales/" + center).set(data)
      .then(() => {
        alert("저장완료");
        location.reload();
      })
      .catch(err => {
        alert("저장 실패: " + err.message);
        console.error(err);
      });

  } catch(e) {
    alert("에러 발생");
    console.error(e);
  }
}
</script>

</body>
</html>
