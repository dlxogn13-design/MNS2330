<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>V18_PATCH</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<style>
body{font-family:Arial;background:#f4f6fb;padding:20px;}
table{width:100%;border-collapse:collapse;font-size:17px;}
th{background:#0f2345;color:white;padding:10px;}
td{padding:8px;text-align:center;border-bottom:1px solid #ddd;}
.rankTop{background:#dbeafe;}
.rankLow{background:#fee2e2;}
.track{height:40px;background:#ddd;border-radius:20px;position:relative;margin:10px 0;}
.finish{position:absolute;left:66%;top:0;bottom:0;width:4px;background:black;}
.runner{position:absolute;top:5px;font-size:20px;}
</style>
</head>

<body>

<h2>강북도매 유/무선 실적</h2>

<table id="tbl">
<thead>
<tr>
<th>센터</th>
<th>무선목표</th><th>무선</th><th>달성율</th><th>순위</th>
<th>MNP</th><th>중고</th>
<th>유선목표</th><th>유선</th><th>달성율</th><th>순위</th>
</tr>
</thead>
<tbody></tbody>
</table>

<h3>전체 트랙</h3>
<div>무선</div>
<div class="track"><div class="finish"></div><div id="rw" class="runner">🏃‍♂️</div></div>
<div>유선</div>
<div class="track"><div class="finish"></div><div id="rl" class="runner">🏃‍♂️</div></div>

<script>
const centers=["서대문","의정부","고양","구리","노원","광진","강릉","원주","춘천"]
let cache={}
let targets={}

function pct(a,b){
 if(!a||!b) return 0
 let v=(a/b)*100
 return v>=100?Math.round(v):(Math.round(v*10)/10)
}

function loadData(){
 firebase.initializeApp({
  databaseURL:"https://sales-dashboard-e7a79-default-rtdb.firebaseio.com"
 })
 const db=firebase.database()
 db.ref().on("value",snap=>{
  cache=snap.val()||{}
  render()
 })
}

function data(c){return cache["c_"+c]||{}}

function render(){
 let tb=document.querySelector("#tbl tbody")
 tb.innerHTML=""

 let wRank=[...centers].map(c=>{
  let d=data(c),t=targets[c]||{}
  return {c,v:(d.w||0)/(t.w||1)}
 }).sort((a,b)=>b.v-a.v)

 let lRank=[...centers].map(c=>{
  let d=data(c),t=targets[c]||{}
  return {c,v:(d.l||0)/(t.l||1)}
 }).sort((a,b)=>b.v-a.v)

 let tw=0,tl=0,ttw=0,ttl=0

 centers.forEach(c=>{
  let d=data(c)
  let t=targets[c]||{w:0,l:0}

  let wr=wRank.findIndex(x=>x.c==c)+1
  let lr=lRank.findIndex(x=>x.c==c)+1

  let wClass=(wr<=2?"rankTop":wr>=8?"rankLow":"")
  let lClass=(lr<=2?"rankTop":lr>=8?"rankLow":"")

  tb.innerHTML+=`
  <tr>
  <td>${c}</td>
  <td>${t.w}</td>
  <td>${d.w||0}</td>
  <td>${pct(d.w,t.w)}%</td>
  <td class="${wClass}">${wr}</td>
  <td>${d.mnp||0}</td>
  <td>${d.used||0}</td>
  <td>${t.l}</td>
  <td>${d.l||0}</td>
  <td>${pct(d.l,t.l)}%</td>
  <td class="${lClass}">${lr}</td>
  </tr>`

  tw+=d.w||0
  tl+=d.l||0
  ttw+=t.w||0
  ttl+=t.l||0
 })

 rw.style.left=(tw/ttw*100)+"%"
 rl.style.left=(tl/ttl*100)+"%"
}

loadData()
</script>

</body>
</html>
