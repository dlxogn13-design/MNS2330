<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>강북도매 유/무선 실적 V18.1</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
body{font-family:Arial;background:#f4f6fb;padding:20px;}
.topbar{display:flex;justify-content:flex-end;gap:10px;margin-bottom:10px;}
.centerGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:20px 0;max-width:420px;}
.centerGrid button{background:#eef1f7;font-weight:bold;padding:10px;border:1px solid #ccc;border-radius:6px;}
table{width:100%;border-collapse:collapse;margin-top:15px;font-size:13px;}
th{background:#0f2345;color:white;padding:8px;}
td{border-bottom:1px solid #ddd;padding:6px;text-align:center;}
.group{background:#eef3ff;font-weight:bold;}
.rankTop{background:#dbe9ff;}
.rankLow{background:#ffdede;}
.track{position:relative;height:18px;background:#e2e6f0;border-radius:10px;margin:10px 0;}
.finish{position:absolute;right:0;width:4px;height:100%;background:red;}
.runner{position:absolute;top:-4px;font-size:18px;white-space:nowrap;}
.popup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:white;padding:20px;border-radius:10px;display:none;}
.popup input{width:150px;margin-bottom:8px;padding:6px;}
</style>
</head>
<body>

<div class="topbar">
<button onclick="resetData()">초기화</button>
<button onclick="location.href='index.html'">메인포털</button>
</div>

<h2>강북도매 유/무선 실적</h2>

<div class="centerGrid">
<button onclick="openCenter('서대문')">서대문</button>
<button onclick="openCenter('의정부')">의정부</button>
<button onclick="openCenter('고양')">고양</button>
<button onclick="openCenter('구리')">구리</button>
<button onclick="openCenter('노원')">노원</button>
<button onclick="openCenter('광진')">광진</button>
<button onclick="openCenter('강릉')">강릉</button>
<button onclick="openCenter('원주')">원주</button>
<button onclick="openCenter('춘천')">춘천</button>
</div>

<table id="tbl">
<thead>
<tr>
<th>완료</th><th>센터</th>
<th>무선목표</th><th>무선실적</th><th>달성율</th><th>순위</th><th>증분</th>
<th>MNP</th><th>비중</th><th>중고</th><th>비중</th>
<th>유선목표</th><th>유선실적</th><th>달성율</th><th>순위</th><th>증분</th>
<th>약갱</th>
</tr>
</thead>
<tbody></tbody>
</table>

<h3>강북도매 달성율 트랙</h3>
<div>무선</div>
<div class="track"><div class="finish"></div><div id="rw" class="runner">🏃‍➡️ 0%</div></div>
<div>유선</div>
<div class="track"><div class="finish"></div><div id="rl" class="runner">🏃‍➡️ 0%</div></div>

<div class="popup" id="popup">
<h3 id="pTitle"></h3>
<input id="w" placeholder="무선">
<input id="m" placeholder="MNP">
<input id="u" placeholder="중고">
<input id="l" placeholder="유선">
<input id="r" placeholder="약갱">
<button onclick="save()">저장</button>
<button onclick="popup.style.display='none'">닫기</button>
</div>

<script>
const centers=["서대문","의정부","고양","구리","노원","광진","강릉","원주","춘천"]
const gangbuk=["서대문","의정부","고양","구리","노원","광진"]
const gangwon=["강릉","원주","춘천"]
let targets={}

function today(){
let d=new Date()
return (d.getMonth()+1)+"/"+d.getDate()
}

function formatDate(v){
  if(v instanceof Date){
    return (v.getMonth()+1)+"/"+v.getDate()
  }
  if(typeof v === "number"){
    let d = XLSX.SSF.parse_date_code(v)
    if(d) return d.m+"/"+d.d
  }
  return String(v).trim()
}

async function loadTargets(){
let res=await fetch("target.xlsx")
let buf=await res.arrayBuffer()
let wb=XLSX.read(buf)

let wsW=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1})
let wsL=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[1]],{header:1})

let t=today()
let col=-1

wsW[0].forEach((v,i)=>{
 if(formatDate(v)===t){col=i}
})

centers.forEach(c=>{
let rowW=wsW.find(r=>String(r[0]).trim()==c)
let rowL=wsL.find(r=>String(r[0]).trim()==c)

targets[c]={
w:rowW?Number(rowW[col]||0):0,
l:rowL?Number(rowL[col]||0):0
}
})

render()
}

function getData(c){
return JSON.parse(localStorage.getItem("c_"+c)||"{}")
}

function sum(list){
let o={w:0,l:0,m:0,u:0,r:0,wt:0,lt:0}
list.forEach(c=>{
let s=getData(c)
o.w+=Number(s.w||0)
o.l+=Number(s.l||0)
o.m+=Number(s.m||0)
o.u+=Number(s.u||0)
o.r+=Number(s.r||0)
o.wt+=Number(targets[c]?.w||0)
o.lt+=Number(targets[c]?.l||0)
})
return o
}

function render(){
let tb=document.querySelector("#tbl tbody")
tb.innerHTML=""

let gAll=sum(centers)
let gBuk=sum(gangbuk)
let gWon=sum(gangwon)

function makeGroup(name,g){
let wa=g.wt?Math.round(g.w/g.wt*100):0
let la=g.lt?Math.round(g.l/g.lt*100):0

return `<tr class="group">
<td></td><td>${name}</td>
<td>${g.wt}</td><td>${g.w}</td><td>${wa}%</td><td>-</td><td>-</td>
<td>${g.m}</td><td>${g.w?Math.round(g.m/g.w*100):0}%</td>
<td>${g.u}</td><td>${g.w?Math.round(g.u/g.w*100):0}%</td>
<td>${g.lt}</td><td>${g.l}</td><td>${la}%</td><td>-</td><td>-</td>
<td>${g.r}</td>
</tr>`
}

tb.innerHTML+=makeGroup("강북도매계",gAll)
tb.innerHTML+=makeGroup("강북상권계",gBuk)
tb.innerHTML+=makeGroup("강원상권계",gWon)

let arr=[]

centers.forEach(c=>{
let s=getData(c)
let w=s.w||0,l=s.l||0
let wt=targets[c]?.w||0
let lt=targets[c]?.l||0
let wa=wt?w/wt*100:0
let la=lt?l/lt*100:0

arr.push({c,w,l,wt,lt,wa,la})
})

let wr=[...arr].sort((a,b)=>b.wa-a.wa)
let lr=[...arr].sort((a,b)=>b.la-a.la)

let wm={},lm={}
wr.forEach((r,i)=>wm[r.c]=i+1)
lr.forEach((r,i)=>lm[r.c]=i+1)

arr.forEach(d=>{
let s=getData(d.c)
let m=s.m||0,u=s.u||0,r=s.r||0

tb.innerHTML+=`
<tr>
<td>${d.w||d.l?"✔️":""}</td>
<td>${d.c}</td>
<td>${d.wt}</td><td>${d.w}</td><td>${Math.round(d.wa)}%</td>
<td class="${wm[d.c]<=2?'rankTop':(wm[d.c]>=8?'rankLow':'')}">${wm[d.c]}</td>
<td>0</td>
<td>${m}</td><td>${d.w?Math.round(m/d.w*100):0}%</td>
<td>${u}</td><td>${d.w?Math.round(u/d.w*100):0}%</td>
<td>${d.lt}</td><td>${d.l}</td><td>${Math.round(d.la)}%</td>
<td class="${lm[d.c]<=2?'rankTop':(lm[d.c]>=8?'rankLow':'')}">${lm[d.c]}</td>
<td>0</td>
<td>${r}</td>
</tr>`
})

let wPct=gAll.wt?Math.min(100,Math.round(gAll.w/gAll.wt*100)):0
let lPct=gAll.lt?Math.min(100,Math.round(gAll.l/gAll.lt*100)):0

document.getElementById("rw").style.left=wPct+"%"
document.getElementById("rw").innerText="🏃‍➡️ "+wPct+"%"
document.getElementById("rl").style.left=lPct+"%"
document.getElementById("rl").innerText="🏃‍➡️ "+lPct+"%"
}

let cur=""
function openCenter(c){
cur=c
let s=getData(c)
w.value=s.w||""
m.value=s.m||""
u.value=s.u||""
l.value=s.l||""
r.value=s.r||""
pTitle.innerText=c
popup.style.display="block"
}

function save(){
localStorage.setItem("c_"+cur,JSON.stringify({
w:w.value,m:m.value,u:u.value,l:l.value,r:r.value
}))
popup.style.display="none"
render()
}

function resetData(){
localStorage.clear()
location.reload()
}

loadTargets()
</script>
</body>
</html>
