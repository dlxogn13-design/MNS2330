<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDgTFfUykzYpLy21gYV3T6Yz3qJckqEwsQ",
  authDomain: "sales-dashboard-e7a79.firebaseapp.com",
  databaseURL: "https://sales-dashboard-e7a79-default-rtdb.firebaseio.com",
  projectId: "sales-dashboard-e7a79"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
</script>

<style>
body{font-family:Arial;background:#f4f6fb;padding:20px;}
.track{position:relative;height:20px;background:#e2e6f0;border-radius:10px;margin:10px 0;}
.runner{position:absolute;top:-5px;font-size:18px;}
</style>
</head>

<body>

<h2>전체 달성 트랙</h2>

<div>무선</div>
<div class="track"><div id="rw" class="runner">🏃 0%</div></div>

<div>유선</div>
<div class="track"><div id="rl" class="runner">🏃 0%</div></div>

<script>
const centers=["서대문","의정부","고양","구리","노원","광진","강릉","원주","춘천"]

const targets={
 "서대문":{w:20,l:10},
 "의정부":{w:20,l:10},
 "고양":{w:20,l:10},
 "구리":{w:20,l:10},
 "노원":{w:20,l:10},
 "광진":{w:20,l:10},
 "강릉":{w:15,l:8},
 "원주":{w:15,l:8},
 "춘천":{w:15,l:8}
}

let cache={}

function getData(c){ return cache["c_"+c] || {} }

function render(){
 let totalW=0,totalWT=0
 let totalL=0,totalLT=0

 centers.forEach(c=>{
  let s=getData(c)
  let t=targets[c]||{w:0,l:0}

  totalW+=Number(s.w||0)
  totalWT+=t.w
  totalL+=Number(s.l||0)
  totalLT+=t.l
 })

 let wPct= totalWT? Math.round((totalW/totalWT)*100):0
 let lPct= totalLT? Math.round((totalL/totalLT)*100):0

 rw.style.left=wPct+"%"
 rl.style.left=lPct+"%"

 rw.innerText="🏃 "+wPct+"%"
 rl.innerText="🏃 "+lPct+"%"
}

function loadData(){
 db.ref().on("value",snap=>{
  cache=snap.val()||{}
  render()
 })
}

loadData()
</script>

</body>
</html>
