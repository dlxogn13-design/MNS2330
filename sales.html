
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>유무선 실적</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
</head>
<body>

<div class="nav">
<button class="homeBtn" onclick="location.href='index.html'">🏠 메인</button>
</div>

<h2 id="timeTitle"></h2>
<h3 id="completeCount"></h3>

<div class="totals-grid" id="totalsBoxes"></div>

<div class="center-grid" id="centers"></div>

<table id="summary">
<thead>
<tr>
<th>센터</th>
<th>완료</th>
<th>무선목표</th>
<th>무선실적</th>
<th>달성율</th>
<th>MNP</th>
<th>중고</th>
<th>유선목표</th>
<th>유선실적</th>
<th>달성율</th>
<th>약갱</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>

const centers=["서대문","의정부","고양","구리","노원","광진","강릉","원주","춘천"]
const gangbuk=["서대문","의정부","고양","구리","노원","광진"]
const gangwon=["강릉","원주","춘천"]

document.getElementById("timeTitle").innerText="강북도매 유/무선 실적 "+new Date().getHours()+"시 기준"

let grid=document.getElementById("centers")

centers.forEach(c=>{

let b=document.createElement("button")
b.innerText=c
b.id="btn_"+c
b.onclick=()=>location.href="center.html?c="+c
grid.appendChild(b)

})

async function loadTargets(){

const file=await fetch("target.xlsx")
const data=await file.arrayBuffer()
const wb=XLSX.read(data)

const wSheet=XLSX.utils.sheet_to_json(wb.Sheets["무선목표"])
const lSheet=XLSX.utils.sheet_to_json(wb.Sheets["유선목표"])

let today=new Date()
let key=(today.getMonth()+1)+"/"+today.getDate()

let targets={}

wSheet.forEach(r=>{

let val=0

Object.keys(r).forEach(c=>{

if(c.includes(key)) val=r[c]

})

targets[r.센터]={w:val,l:0}

})

lSheet.forEach(r=>{

let val=0

Object.keys(r).forEach(c=>{

if(c.includes(key)) val=r[c]

})

if(!targets[r.센터]) targets[r.센터]={}

targets[r.센터].l=val

})

return targets

}

function rateColor(rate){

rate=parseFloat(rate)

if(rate>=100) return "rateGreen"
if(rate>=80) return "rateYellow"
return "rateRed"

}

function loadData(targets){

let html=""
let complete=0

let gW=0
let gL=0
let gwW=0
let gwL=0

centers.forEach(c=>{

let d=JSON.parse(localStorage.getItem(c)||"{}")

let w=d.w||0
let m=d.m||0
let u=d.u||0
let l=d.l||0
let r=d.r||0

let done=w||m||u||l||r

if(done){
complete++
document.getElementById("btn_"+c).classList.add("centerDone")
}

let tw=targets[c]?.w||0
let tl=targets[c]?.l||0

let rateW=tw?((w/tw)*100).toFixed(1):0
let rateL=tl?((l/tl)*100).toFixed(1):0

html+=`<tr>
<td>${c}</td>
<td>${done?"✔":""}</td>
<td>${tw}</td>
<td>${w}</td>
<td class="${rateColor(rateW)}">${rateW}%</td>
<td>${m}</td>
<td>${u}</td>
<td>${tl}</td>
<td>${l}</td>
<td class="${rateColor(rateL)}">${rateL}%</td>
<td>${r}</td>
</tr>`

if(gangbuk.includes(c)){
gW+=w
gL+=l
}

if(gangwon.includes(c)){
gwW+=w
gwL+=l
}

})

document.querySelector("#summary tbody").innerHTML=html

document.getElementById("completeCount").innerText="센터 입력 "+complete+" / 9 완료"

let totalsHTML=""

totalsHTML+=`<div class="totalCard">강북상권<br>무선 ${gW} / 유선 ${gL}</div>`
totalsHTML+=`<div class="totalCard">강원상권<br>무선 ${gwW} / 유선 ${gwL}</div>`
totalsHTML+=`<div class="totalCard">강북총계<br>무선 ${gW+gwW} / 유선 ${gL+gwL}</div>`

document.getElementById("totalsBoxes").innerHTML=totalsHTML

}

async function init(){

let targets=await loadTargets()
loadData(targets)

}

init()

</script>

</body>
</html>
