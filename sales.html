<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>V18.3 STEP4 FINAL</title>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDgTFfUykzYpLy21gYV3T6Yz3qJckqEwsQ",
  authDomain: "sales-dashboard-e7a79.firebaseapp.com",
  databaseURL: "https://sales-dashboard-e7a79-default-rtdb.firebaseio.com",
  projectId: "sales-dashboard-e7a79"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
</script>

<style>
body{font-family:Arial;background:#f4f6fb;padding:20px;}
.centerGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:20px 0;max-width:420px;}
.centerGrid button{background:#eef1f7;padding:10px;border:1px solid #ccc;border-radius:6px;}
table{width:100%;border-collapse:collapse;margin-top:15px;font-size:13px;}
th{background:#0f2345;color:white;padding:8px;}
td{border-bottom:1px solid #ddd;padding:6px;text-align:center;}
.track{position:relative;height:20px;background:#e2e6f0;border-radius:10px;margin:10px 0;}
.runner{position:absolute;top:-5px;font-size:18px;}
.popup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:white;padding:20px;border-radius:10px;display:none;}
</style>
</head>

<body>

<h2>강북도매 유/무선 실적</h2>

<div class="centerGrid">
<button onclick="openCenter('서대문')">서대문</button>
<button onclick="openCenter('의정부')">의정부</button>
<button onclick="openCenter('고양')">고양</button>
<button onclick="openCenter('구리')">구리</button>
<button onclick="openCenter('노원')">노원</button>
<button onclick="openCenter('광진')">광진</button>
<button onclick="openCenter('강릉')">강릉</button>
<button onclick="openCenter('원주')">원주</button>
<button onclick="openCenter('춘천')">춘천</button>
</div>

<table id="tbl">
<thead>
<tr>
<th>센터</th>
<th>무선</th><th>목표</th><th>달성%</th>
<th>MNP</th><th>비중</th>
<th>중고</th><th>비중</th>
<th>유선</th><th>목표</th><th>달성%</th>
<th>약갱</th>
</tr>
</thead>
<tbody></tbody>
</table>

<h3>전체 트랙</h3>
<div>무선</div>
<div class="track"><div id="rw" class="runner">0%</div></div>
<div>유선</div>
<div class="track"><div id="rl" class="runner">0%</div></div>

<div class="popup" id="popup">
<h3 id="pTitle"></h3>
<input id="w" placeholder="무선"><br>
<input id="m" placeholder="MNP"><br>
<input id="u" placeholder="중고"><br>
<input id="l" placeholder="유선"><br>
<input id="r" placeholder="약갱"><br>
<button onclick="save()">저장</button>
</div>

<script>
const centers=["서대문","의정부","고양","구리","노원","광진","강릉","원주","춘천"]

const targets={
 "서대문":{w:20,l:10},
 "의정부":{w:20,l:10},
 "고양":{w:20,l:10},
 "구리":{w:20,l:10},
 "노원":{w:20,l:10},
 "광진":{w:20,l:10},
 "강릉":{w:15,l:8},
 "원주":{w:15,l:8},
 "춘천":{w:15,l:8}
}

let cache={}
let cur=""

function getData(c){ return cache["c_"+c] || {} }

function percent(a,b){
 if(!b) return "0%"
 return Math.round((a/b)*100)+"%"
}

function render(){
 let tb=document.querySelector("#tbl tbody")
 tb.innerHTML=""

 let totalW=0,totalWT=0
 let totalL=0,totalLT=0

 centers.forEach(c=>{
  let s=getData(c)
  let t=targets[c]

  totalW+=Number(s.w||0)
  totalWT+=t.w
  totalL+=Number(s.l||0)
  totalLT+=t.l

  tb.innerHTML+=`
  <tr>
  <td>${c}</td>
  <td>${s.w||0}</td><td>${t.w}</td><td>${percent(s.w||0,t.w)}</td>
  <td>${s.m||0}</td><td>${percent(s.m||0,s.w||0)}</td>
  <td>${s.u||0}</td><td>${percent(s.u||0,s.w||0)}</td>
  <td>${s.l||0}</td><td>${t.l}</td><td>${percent(s.l||0,t.l)}</td>
  <td>${s.r||0}</td>
  </tr>`
 })

 let wPct= totalWT? Math.round((totalW/totalWT)*100):0
 let lPct= totalLT? Math.round((totalL/totalLT)*100):0

 rw.style.left=wPct+"%"
 rl.style.left=lPct+"%"

 rw.innerText="🏃 "+wPct+"%"
 rl.innerText="🏃 "+lPct+"%"
}

function loadData(){
 db.ref().on("value",snap=>{
  cache=snap.val()||{}
  render()
 })
}

function openCenter(c){
 cur=c
 let s=getData(c)
 w.value=s.w||""
 m.value=s.m||""
 u.value=s.u||""
 l.value=s.l||""
 r.value=s.r||""
 pTitle.innerText=c
 popup.style.display="block"
}

function save(){
 db.ref("c_"+cur).set({
  w:Number(w.value||0),
  m:Number(m.value||0),
  u:Number(u.value||0),
  l:Number(l.value||0),
  r:Number(r.value||0)
 })
 popup.style.display="none"
}

loadData()
</script>

</body>
</html>
