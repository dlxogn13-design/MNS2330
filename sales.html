<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>강북도매 유/무선 실적 V23 (Firebase 완전체)</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<style>
body{font-family:Arial;background:#f4f6fb;padding:20px;}
.topbar{display:flex;justify-content:flex-end;gap:10px;}
.centerGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:20px 0;max-width:420px;}
.centerGrid button{background:#eef1f7;font-weight:bold;padding:10px;border:1px solid #ccc;border-radius:6px;}
table{width:100%;border-collapse:collapse;margin-top:15px;font-size:13px;}
th{background:#0f2345;color:white;padding:8px;}
td{border-bottom:1px solid #ddd;padding:6px;text-align:center;}
.rankTop{background:#dbe9ff;}
.rankLow{background:#ffdede;}
.popup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
background:white;padding:20px;border-radius:10px;display:none;}
.popup input{width:120px;margin-bottom:6px;}
</style>
</head>

<body>

<div class="topbar">
<button onclick="resetData()">초기화</button>
</div>

<h3>⚠ Firebase 설정 넣어야 작동함</h3>

<div class="centerGrid" id="grid"></div>

<table id="tbl">
<thead>
<tr>
<th>센터</th><th>무선</th><th>유선</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>

// 🔥 여기에 Firebase 값 넣어야 작동함
const firebaseConfig = {
  apiKey: "여기에넣기",
  authDomain: "여기에넣기",
  databaseURL: "여기에넣기",
  projectId: "여기에넣기"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const centers=["서대문","의정부","고양","구리","노원","광진","강릉","원주","춘천"]

let data={}

function init(){

 let g=document.getElementById("grid")
 centers.forEach(c=>{
  let b=document.createElement("button")
  b.innerText=c
  b.onclick=()=>inputData(c)
  g.appendChild(b)
 })

 db.ref("centers").on("value",snap=>{
  data=snap.val()||{}
  render()
 })

}

function render(){
 let tb=document.querySelector("#tbl tbody")
 tb.innerHTML=""

 centers.forEach(c=>{
  let d=data[c]||{}
  tb.innerHTML+=`
  <tr>
    <td>${c}</td>
    <td>${d.w||0}</td>
    <td>${d.l||0}</td>
  </tr>`
 })

}

function inputData(c){
 let w=prompt(c+" 무선 입력")
 let l=prompt(c+" 유선 입력")

 db.ref("centers/"+c).set({
  w:Number(w||0),
  l:Number(l||0)
 })
}

function resetData(){
 db.ref("centers").set(null)
}

init()

</script>

</body>
</html>
