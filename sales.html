<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>FINAL_STEP_INPUT_EXPANDED</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDgTFfUykzYpLy21gYV3T6Yz3qJckqEwsQ",
  authDomain: "sales-dashboard-e7a79.firebaseapp.com",
  databaseURL: "https://sales-dashboard-e7a79-default-rtdb.firebaseio.com",
  projectId: "sales-dashboard-e7a79"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
</script>

<style>
body{font-family:Arial;background:#f4f6fb;padding:20px;}
.centerGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:10px 0;}
button{padding:10px;border-radius:6px;border:1px solid #ccc;background:#eef1f7;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{background:#0f2345;color:white;padding:8px;}
td{border-bottom:1px solid #ddd;padding:6px;text-align:center;}
.popup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
background:white;padding:15px;border-radius:10px;display:none;}
input{width:120px;margin:3px 0;}
</style>
</head>

<body>

<h2>강북도매 유/무선 실적</h2>

<div class="centerGrid" id="btnWrap"></div>

<table id="tbl">
<thead>
<tr>
<th>센터</th>
<th>무선목표</th><th>무선</th><th>%</th>
<th>MNP</th><th>비중</th>
<th>중고</th><th>비중</th>
<th>유선목표</th><th>유선</th><th>%</th>
<th>약갱</th>
</tr>
</thead>
<tbody></tbody>
</table>

<div class="popup" id="popup">
<h3 id="pTitle"></h3>

<input id="w" placeholder="무선"><br>
<input id="mnp" placeholder="MNP"><br>
<input id="used" placeholder="중고"><br>
<input id="l" placeholder="유선"><br>
<input id="yak" placeholder="약갱"><br>

<button onclick="save()">저장</button>
</div>

<script>
const centers=["서대문","의정부","고양","구리","노원","광진","강릉","원주","춘천"]
let targets={}
let cache={}
let cur=""

function percent(a,b){
 if(!a || !b) return "0%"
 return Math.round((a/b)*100)+"%"
}

function ratio(a,b){
 if(!a || !b) return "0%"
 return Math.round((a/b)*100)+"%"
}

function getColIndex(header){
 let today=new Date().getDate()
 for(let i=0;i<header.length;i++){
  let v=header[i]
  if(typeof v==="number"){
   let d=XLSX.SSF.parse_date_code(v)
   if(d && d.d===today) return i
  }
  if(typeof v==="string" && v.includes("/"+today)) return i
 }
 return -1
}

async function loadTarget(){
 const res=await fetch("target.xlsx")
 const data=await res.arrayBuffer()
 const wb=XLSX.read(data)

 let w=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1})
 let l=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[1]],{header:1})

 let col=getColIndex(w[0])

 centers.forEach(c=>{
  let rowW=w.find(r=>r[0]===c)
  let rowL=l.find(r=>r[0]===c)
  targets[c]={ w: rowW?rowW[col]:0, l: rowL?rowL[col]:0 }
 })

 loadData()
}

function getData(c){return cache["c_"+c]||{}}

function renderButtons(){
 let wrap=document.getElementById("btnWrap")
 wrap.innerHTML=""
 centers.forEach(c=>{
  wrap.innerHTML+=`<button onclick="openCenter('${c}')">${c}</button>`
 })
}

function render(){
 let tb=document.querySelector("#tbl tbody")
 tb.innerHTML=""

 centers.forEach(c=>{
  let s=getData(c)
  let t=targets[c]||{w:0,l:0}

  tb.innerHTML+=`
  <tr>
  <td>${c}</td>
  <td>${t.w||0}</td>
  <td>${s.w||0}</td>
  <td>${percent(s.w,t.w)}</td>
  <td>${s.mnp||0}</td>
  <td>${ratio(s.mnp,s.w)}</td>
  <td>${s.used||0}</td>
  <td>${ratio(s.used,s.w)}</td>
  <td>${t.l||0}</td>
  <td>${s.l||0}</td>
  <td>${percent(s.l,t.l)}</td>
  <td>${s.yak||0}</td>
  </tr>`
 })
}

function loadData(){
 db.ref().on("value",snap=>{
  cache=snap.val()||{}
  render()
 })
}

function openCenter(c){
 cur=c
 let s=getData(c)
 w.value=s.w||""
 mnp.value=s.mnp||""
 used.value=s.used||""
 l.value=s.l||""
 yak.value=s.yak||""
 pTitle.innerText=c
 popup.style.display="block"
}

function save(){
 db.ref("c_"+cur).update({
  w:Number(w.value||0),
  mnp:Number(mnp.value||0),
  used:Number(used.value||0),
  l:Number(l.value||0),
  yak:Number(yak.value||0),
  t:Date.now()
 })
 popup.style.display="none"
}

renderButtons()
loadTarget()
</script>

</body>
</html>
