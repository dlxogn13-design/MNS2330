
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>유무선 실적</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
</head>
<body>

<div class="nav">
<button onclick="location.href='index.html'">🏠 메인</button>
</div>

<h2 id="timeTitle"></h2>
<h3 id="completeCount"></h3>

<div id="topCenters"></div>
<div class="center-grid" id="centers"></div>

<table id="summary">
<thead>
<tr>
<th>센터</th>
<th>완료</th>
<th>무선목표</th>
<th>무선실적</th>
<th>달성율</th>
<th>순위</th>
<th>MNP</th>
<th>중고</th>
<th>유선목표</th>
<th>유선실적</th>
<th>달성율</th>
<th>약갱</th>
</tr>
</thead>
<tbody></tbody>
</table>

<h3 id="totals"></h3>

<script>

setInterval(()=>location.reload(),300000)

const centers=["서대문","의정부","고양","구리","노원","광진","강릉","원주","춘천"]
const gangbuk=["서대문","의정부","고양","구리","노원","광진"]
const gangwon=["강릉","원주","춘천"]

document.getElementById("timeTitle").innerText="강북도매 유/무선 실적 "+new Date().getHours()+"시 기준"

let grid=document.getElementById("centers")

centers.forEach(c=>{
let b=document.createElement("button")
b.innerText=c
b.onclick=()=>location.href="center.html?c="+c
grid.appendChild(b)
})

async function loadTargets(){

const file=await fetch("target.xlsx")
const data=await file.arrayBuffer()
const wb=XLSX.read(data)

const wSheet=XLSX.utils.sheet_to_json(wb.Sheets["무선목표"])
const lSheet=XLSX.utils.sheet_to_json(wb.Sheets["유선목표"])

let today=new Date()
let key=(today.getMonth()+1)+"/"+today.getDate()

let targets={}

wSheet.forEach(r=>{
let val=0
Object.keys(r).forEach(c=>{ if(c.includes(key)) val=r[c] })
targets[r.센터]={w:val,l:0}
})

lSheet.forEach(r=>{
let val=0
Object.keys(r).forEach(c=>{ if(c.includes(key)) val=r[c] })
if(!targets[r.센터])targets[r.센터]={}
targets[r.센터].l=val
})

return targets
}

function loadData(targets){

let rows=[]
let complete=0

let gW=0
let gL=0
let gwW=0
let gwL=0

centers.forEach(c=>{

let d=JSON.parse(localStorage.getItem(c)||"{}")

let w=d.w||0
let m=d.m||0
let u=d.u||0
let l=d.l||0
let r=d.r||0

let done=w||m||u||l||r

if(done) complete++

let tw=targets[c]?.w||0
let tl=targets[c]?.l||0

let rateW=tw?((w/tw)*100):0
let rateL=tl?((l/tl)*100):0

rows.push({c,w,m,u,l,r,tw,tl,rateW,rateL,done})

if(gangbuk.includes(c)){
gW+=w
gL+=l
}

if(gangwon.includes(c)){
gwW+=w
gwL+=l
}

})

rows.sort((a,b)=>b.rateW-a.rateW)
rows.forEach((row,i)=>row.rank=i+1)

let topHTML="<b>🏆 TOP 센터</b><br>"
rows.slice(0,3).forEach((r,i)=>{
topHTML+=`${i+1}위 ${r.c} (${r.rateW.toFixed(1)}%)<br>`
})

document.getElementById("topCenters").innerHTML=topHTML
document.getElementById("completeCount").innerText="센터 입력 "+complete+" / 9 완료"

let html=""

rows.forEach(r=>{

html+=`<tr>
<td>${r.c}</td>
<td>${r.done?"✔":""}</td>
<td>${r.tw}</td>
<td>${r.w}</td>
<td>${r.rateW.toFixed(1)}%</td>
<td>${r.rank}</td>
<td>${r.m}</td>
<td>${r.u}</td>
<td>${r.tl}</td>
<td>${r.l}</td>
<td>${r.rateL.toFixed(1)}%</td>
<td>${r.r}</td>
</tr>`

})

document.querySelector("#summary tbody").innerHTML=html

document.getElementById("totals").innerText=
"강북상권 무선 "+gW+" / 유선 "+gL+"   |   강원상권 무선 "+gwW+" / 유선 "+gwL+"   |   강북총계 무선 "+(gW+gwW)+" / 유선 "+(gL+gwL)

}

async function init(){

let targets=await loadTargets()
loadData(targets)

}

init()

</script>

</body>
</html>
