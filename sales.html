
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>강북도매 유/무선 실적</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body{font-family:Arial;background:#f4f6fb;padding:20px;}
.topbar{display:flex;justify-content:flex-end;gap:10px;margin-bottom:10px;}
.centerGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:20px 0;max-width:420px;}
.centerGrid button{background:#eef1f7;font-weight:bold;padding:10px;border:1px solid #ccc;border-radius:6px;}
table{width:100%;border-collapse:collapse;margin-top:15px;font-size:13px;}
th{background:#0f2345;color:white;padding:8px;}
td{border-bottom:1px solid #ddd;padding:6px;text-align:center;}
.groupRow{background:#eef3ff;font-weight:bold;}
.rankTop{background:#dbe9ff;}
.rankLow{background:#ffdede;}
.warn{color:red;font-weight:bold;}
.track{position:relative;height:18px;background:#e2e6f0;border-radius:10px;margin:10px 0;}
.finish{position:absolute;right:0;width:4px;height:100%;background:red;}
.runner{position:absolute;top:-4px;font-size:20px;}
.popup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:white;border-radius:10px;padding:20px;box-shadow:0 5px 20px rgba(0,0,0,0.2);display:none;width:260px;}
.popup input{width:100%;margin-bottom:8px;padding:6px;}
</style>
</head>

<body>

<div class="topbar">
<button onclick="resetData()">초기화</button>
<button onclick="location.href='index.html'">메인포털</button>
</div>

<h2>강북도매 유/무선 실적</h2>

<div class="centerGrid">
<button onclick="openCenter('서대문')">서대문</button>
<button onclick="openCenter('의정부')">의정부</button>
<button onclick="openCenter('고양')">고양</button>
<button onclick="openCenter('구리')">구리</button>
<button onclick="openCenter('노원')">노원</button>
<button onclick="openCenter('광진')">광진</button>
<button onclick="openCenter('강릉')">강릉</button>
<button onclick="openCenter('원주')">원주</button>
<button onclick="openCenter('춘천')">춘천</button>
</div>

<table id="salesTable">
<thead>
<tr>
<th>완료</th><th>센터</th>
<th>무선목표</th><th>무선실적</th><th>달성율</th>
<th>순위</th><th>증분</th>
<th>MNP</th><th>비중</th>
<th>중고</th><th>비중</th>
<th>유선목표</th><th>유선실적</th><th>달성율</th>
<th>순위</th><th>증분</th>
<th>약갱</th>
</tr>
</thead>
<tbody></tbody>
</table>

<div style="margin-top:20px;font-weight:bold">강북도매 달성율 트랙</div>
무선
<div class="track"><div class="finish"></div><div class="runner" id="wireRunner">🏃‍➡️</div></div>
유선
<div class="track"><div class="finish"></div><div class="runner" id="lineRunner">🏃‍➡️</div></div>

<div class="popup" id="centerPopup">
<h3 id="popupCenter"></h3>
<input id="wireless" placeholder="무선실적">
<input id="mnp" placeholder="MNP">
<input id="used" placeholder="중고">
<input id="wired" placeholder="유선실적">
<input id="renew" placeholder="약갱">
<button onclick="saveCenter()">저장</button>
<button onclick="closePopup()">닫기</button>
</div>

<script>

const centers=["서대문","의정부","고양","구리","노원","광진","강릉","원주","춘천"]
const gangbuk=["서대문","의정부","고양","구리","노원","광진"]
const gangwon=["강릉","원주","춘천"]

let targets={}

function resetData(){
localStorage.clear()
location.reload()
}

function todayMD(){
let d=new Date()
return (d.getMonth()+1)+"/"+d.getDate()
}

async function loadTargets(){

let res=await fetch("target.xlsx")
let buf=await res.arrayBuffer()
let wb=XLSX.read(buf)

let wsW=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1})
let wsL=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[1]],{header:1})

let today=todayMD()
let dateRow=wsW[1]
let colIndex=-1

dateRow.forEach((v,i)=>{
 if(v instanceof Date){
  let m=v.getMonth()+1
  let d=v.getDate()
  if(m+"/"+d===today){colIndex=i}
 }
})

centers.forEach(c=>{

let rowW=wsW.find(r=>r.includes(c))
let rowL=wsL.find(r=>r.includes(c))

targets[c]={
wireless: rowW?rowW[colIndex]||0:0,
wired: rowL?rowL[colIndex]||0:0
}

})

render()
}

function render(){

let tbody=document.querySelector("#salesTable tbody")
tbody.innerHTML=""

let centerData=[]
let totals={w:0,wt:0,l:0,lt:0,mnp:0,used:0,renew:0,incW:0,incL:0}
let gb={w:0,wt:0,l:0,lt:0,mnp:0,used:0,renew:0,incW:0,incL:0}
let gw={w:0,wt:0,l:0,lt:0,mnp:0,used:0,renew:0,incW:0,incL:0}

centers.forEach(c=>{

let s=JSON.parse(localStorage.getItem("center_"+c)||"{}")
let prev=JSON.parse(localStorage.getItem("prev_"+c)||"{}")

let w=Number(s.wireless||0)
let l=Number(s.wired||0)
let mnp=Number(s.mnp||0)
let used=Number(s.used||0)
let renew=Number(s.renew||0)

let wt=targets[c]?.wireless||0
let lt=targets[c]?.wired||0

let incW=w-(prev.wireless||0)
let incL=l-(prev.wired||0)

centerData.push({c,w,l,mnp,used,renew,wt,lt,incW,incL})

totals.w+=w; totals.wt+=wt
totals.l+=l; totals.lt+=lt
totals.mnp+=mnp; totals.used+=used; totals.renew+=renew
totals.incW+=incW; totals.incL+=incL

if(gangbuk.includes(c)){
gb.w+=w; gb.wt+=wt; gb.l+=l; gb.lt+=lt
gb.mnp+=mnp; gb.used+=used; gb.renew+=renew
gb.incW+=incW; gb.incL+=incL
}

if(gangwon.includes(c)){
gw.w+=w; gw.wt+=wt; gw.l+=l; gw.lt+=lt
gw.mnp+=mnp; gw.used+=used; gw.renew+=renew
gw.incW+=incW; gw.incL+=incL
}

})

centerData.forEach(d=>{
d.wa=d.wt?d.w/d.wt*100:0
d.la=d.lt?d.l/d.lt*100:0
})

let wirelessRank=[...centerData].sort((a,b)=>b.wa-a.wa)
let wiredRank=[...centerData].sort((a,b)=>b.la-a.la)

let wRankMap={},lRankMap={}
wirelessRank.forEach((r,i)=>wRankMap[r.c]=i+1)
wiredRank.forEach((r,i)=>lRankMap[r.c]=i+1)

function regionRank(){
let arr=[
{name:"강북상권계",ach:gb.wt?gb.w/gb.wt:0},
{name:"강원상권계",ach:gw.wt?gw.w/gw.wt:0}
]
arr.sort((a,b)=>b.ach-a.ach)
let map={}
arr.forEach((r,i)=>map[r.name]=i+1)
return map
}

let rRank=regionRank()

function groupRow(name,data){

let wa=data.wt?data.w/data.wt*100:0
let la=data.lt?data.l/data.lt*100:0

let rankCell="-"
if(name!=="강북도매계"){
let r=rRank[name]
rankCell=r
}

return `<tr class="groupRow">
<td></td>
<td>${name}</td>
<td>${data.wt}</td>
<td>${data.w}</td>
<td>${wa.toFixed(0)}%</td>
<td>${rankCell}</td>
<td>${data.incW}</td>
<td>${data.mnp}</td>
<td>${data.w?(data.mnp/data.w*100).toFixed(0):0}%</td>
<td>${data.used}</td>
<td>${data.w?(data.used/data.w*100).toFixed(0):0}%</td>
<td>${data.lt}</td>
<td>${data.l}</td>
<td>${la.toFixed(0)}%</td>
<td>${rankCell}</td>
<td>${data.incL}</td>
<td>${data.renew}</td>
</tr>`
}

tbody.innerHTML+=groupRow("강북도매계",totals)
tbody.innerHTML+=groupRow("강북상권계",gb)
tbody.innerHTML+=groupRow("강원상권계",gw)

centerData.forEach(d=>{

let wRank=wRankMap[d.c]
let lRank=lRankMap[d.c]

tbody.innerHTML+=`
<tr>
<td>${d.w||d.l?"✔️":""}</td>
<td>${d.c}</td>
<td>${d.wt}</td>
<td>${d.w}</td>
<td>${d.wa.toFixed(0)}%</td>
<td class="${wRank<=2?'rankTop':(wRank>=8?'rankLow':'')}">${wRank}</td>
<td>${d.incW}</td>
<td>${d.mnp}</td>
<td>${d.w?(d.mnp/d.w*100).toFixed(0):0}%</td>
<td>${d.used}</td>
<td>${d.w?(d.used/d.w*100).toFixed(0):0}%</td>
<td>${d.lt}</td>
<td>${d.l}</td>
<td>${d.la.toFixed(0)}%</td>
<td class="${lRank<=2?'rankTop':(lRank>=8?'rankLow':'')}">${lRank}</td>
<td>${d.incL}</td>
<td>${d.renew}</td>
</tr>`
})

let totalAch=totals.wt?totals.w/totals.wt*100:0
let lineAch=totals.lt?totals.l/totals.lt*100:0

document.getElementById("wireRunner").style.left=Math.min(totalAch,100)+"%"
document.getElementById("lineRunner").style.left=Math.min(lineAch,100)+"%"

}

let currentCenter=""

function openCenter(c){
currentCenter=c
let s=JSON.parse(localStorage.getItem("center_"+c)||"{}")
wireless.value=s.wireless||""
mnp.value=s.mnp||""
used.value=s.used||""
wired.value=s.wired||""
renew.value=s.renew||""
popupCenter.innerText=c
centerPopup.style.display="block"
}

function closePopup(){centerPopup.style.display="none"}

function saveCenter(){

let prev=JSON.parse(localStorage.getItem("center_"+currentCenter)||"{}")
localStorage.setItem("prev_"+currentCenter,JSON.stringify(prev))

let data={
wireless:wireless.value,
mnp:mnp.value,
used:used.value,
wired:wired.value,
renew:renew.value
}

localStorage.setItem("center_"+currentCenter,JSON.stringify(data))

closePopup()
render()

}

loadTargets()

</script>
</body>
</html>
