<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>강북도매 유/무선 실적</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<!-- 🔥 여기 추가 -->
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
body{
 font-family:Arial;
 background:#fff;
 padding:20px;
 color:#111;
 font-weight:700;
 font-size:20px;
}

.topbar{display:flex;gap:10px;margin-bottom:12px;}
button{
 padding:18px 24px;
 border-radius:8px;
 border:1px solid #ccc;
 background:#eef1f7;
 font-size:28px;
 font-weight:800;
}

.centerGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:18px 0;}
.centerGrid button{
 background:#1e3a8a;
 color:#fff;
 border:none;
 font-size:25px;
 font-weight:800;
 padding:14px;
}

table{
 width:100%;
 border-collapse:collapse;
 font-size:25px;
}

th,td{
 text-align:center;
 padding:16px;
 border-right:1px solid #bbb;
 white-space:nowrap;
}

th{
 background:#0f2345;
 color:#fff;
 font-size:25px;
}

td:nth-child(10),
th:nth-child(10){
 border-left:4px solid #000;
}

.rankTop{background:#dbeafe;}
.rankLow{background:#fee2e2;}
.group{background:#e5e7eb;font-weight:800;}

.signal{width:14px;height:14px;border-radius:50%;margin:auto;}
.green{background:#22c55e;}
.yellow{background:#facc15;}
.red{background:#ef4444;}

.track{
 height:60px;
 background:#ddd;
 border-radius:30px;
 position:relative;

 width:100vw;          /* 🔥 화면 기준 */
 margin-left:calc(-50vw + 50%);  /* 🔥 가운데 기준으로 풀 확장 */
}

.finish{
 position:absolute;
 left:66%;
 top:0;
 bottom:0;
 width:8px;
 background:repeating-linear-gradient(45deg,black,black 5px,white 5px,white 10px);
}

.runner{
 position:absolute;
 top:-50px;
 text-align:center;
 font-size:72px;
 font-weight:bold;
}
.runner span{
 display:block;
 font-size:40px;
}

.popup{
 position:fixed;
 top:50%;
 left:50%;
 transform:translate(-50%,-50%);
 background:#ffffff;
 padding:0 20px;                 /* 🔥 여백 크게 */
 border-radius:16px;
 display:none;
 width:420px;                 /* 🔥 크기 확대 */
 box-shadow:0 10px 30px rgba(0,0,0,0.25); /* 🔥 고급 느낌 */
 text-align:center;
}

.popup h3{
 font-size:34px;              /* 🔥 제목 크게 */
 margin-bottom:20px;
}

input{
 width:90%;
 margin:12px 0;
 padding:14px;
 font-size:22px;              /* 🔥 입력창 글자 크게 */
 border-radius:8px;
 border:1px solid #ccc;
}

.popup button{
 margin-top:10px;
 padding:14px 20px;
 font-size:20px;              /* 🔥 버튼 크게 */
 font-weight:800;
 border-radius:8px;
}
.track-title{
 font-size:42px;
 font-weight:900;
 margin-top:40px;
 letter-spacing:1px;
}

.track-label{
 font-size:38px;
 font-weight:900;
 margin:10px 0 5px 5px;
}
</style>
</head>

<body>

<div class="topbar">
<button onclick="location.href='index.html'">메인가기</button>
<button onclick="location.reload()">새로고침</button>
<button onclick="adminReset()">초기화</button>

<!-- 🔥 여기 추가 -->
<button onclick="sendTelegram()">📤 실적방 전송</button>

</div>

<div class="centerGrid" id="btns"></div>

<h2>강북도매 유/무선 실적</h2>
<h3 id="titleTime"></h3>

<!-- 🔥 여기 시작 -->
<div id="captureArea">

<table id="tbl">
<thead>
<tr>
<th></th><th>센터</th>
<th>무선목표</th><th>무선</th><th>달성율</th><th>순위</th><th>증분</th>
<th>MNP</th><th>비중</th>
<th>유선목표</th><th>유선</th><th>달성율</th><th>순위</th><th>증분</th>
<th>약갱</th>
</tr>
</thead>
<tbody></tbody>
</table>

<h3 class="track-title">진행 트랙</h3>

<div class="track-label">무선</div>
<div class="track">
<div class="finish"></div>
<div id="rw" class="runner"><span id="pw"></span>🏃‍➡️</div>
</div>

<div class="track-label">유선</div>
<div class="track">
<div class="finish"></div>
<div id="rl" class="runner"><span id="pl"></span>🏃‍➡️</div>
</div>

</div>
<!-- 🔥 여기 끝 -->

<div class="popup" id="popup">
<h3 id="pTitle"></h3>
<input id="w" placeholder="무선">
<input id="m" placeholder="MNP">
<input id="l" placeholder="유선">
<input id="r" placeholder="약갱">
<br>
<button onclick="save()">저장</button>
<button onclick="popup.style.display='none'">닫기</button>
</div>

<script>
const centers=["서대문","의정부","고양","구리","노원","광진","강릉","원주","춘천"]

let cache={},targets={},cur=""
let targetLoaded=false

firebase.initializeApp({
 databaseURL:"https://sales-dashboard-e7a79-default-rtdb.firebaseio.com"
})
const db=firebase.database()

// 🔥 여기 추가
const ADMIN_PW = "2330"

function pct(a,b){
 if(!a||!b) return "-"
 let v=a/b*100
 return v>=100?Math.round(v):(Math.round(v*10)/10)
}

function ratio(a,b){
 if(!a||!b) return 0
 return Math.round(a/b*100)
}

function signal(ts){
 if(!ts) return "red"
 let diff=(Date.now()-ts)/60000
 if(diff<60) return "green"
 if(diff<120) return "yellow"
 return "red"
}

function trackPos(p){
 if(p<=100) return (p/100)*66
 return 66+Math.min(p-100,100)/100*34
}

function updateTime(){
 let n=new Date()
 titleTime.innerText=`${n.getMonth()+1}월 ${n.getDate()}일 ${n.getHours()}시 기준`
}

function adminReset(){
 let pw=prompt("비밀번호")
 if(pw!=="2330") return
 if(confirm("입력값 초기화?")){
  centers.forEach(c=>{
   db.ref("c_"+c).update({w:0,m:0,l:0,r:0,prevW:0,prevL:0,ts:0})
  })
 }
}

function getData(c){return cache["c_"+c]||{}}

function renderBtns(){
 let d=document.getElementById("btns")
 d.innerHTML=""
 centers.forEach(c=>{
  d.innerHTML+=`<button onclick="openCenter('${c}')">${c}</button>`
 })
}

function openCenter(c){
 cur=c
 let s=getData(c)
 w.value=s.w||""
 m.value=s.m||""
 l.value=s.l||""
 r.value=s.r||""
 pTitle.innerText=c
 popup.style.display="block"
}

function render(){


 let tb=document.querySelector("#tbl tbody")
 tb.innerHTML=""

 let wRank=[...centers].map(c=>{
  let s=getData(c),t=targets[c]||{}
  return {c,v:(s.w||0)/(t.w||1)}
 }).sort((a,b)=>b.v-a.v)

 let lRank=[...centers].map(c=>{
  let s=getData(c),t=targets[c]||{}
  return {c,v:(s.l||0)/(t.l||1)}
 }).sort((a,b)=>b.v-a.v)

 let sum={w:0,l:0,tw:0,tl:0}

 centers.forEach(c=>{
  let s=getData(c),t=targets[c]||{}
  let wr=wRank.findIndex(x=>x.c==c)+1
  let lr=lRank.findIndex(x=>x.c==c)+1

  tb.innerHTML+=`
  <tr>
  <td><div class="signal ${signal(s.ts)}"></div></td>
  <td>${c}</td>

  <td>${t.w||0}</td>
  <td>${s.w||0}</td>
  <td>${pct(s.w,t.w)}%</td>
  <td class="${wr<=2?'rankTop':wr>=8?'rankLow':''}">${wr}</td>
  <td>${(s.w||0)-(s.prevW||0)}</td>

  <td>${s.m||0}</td>
  <td>${ratio(s.m,s.w)}%</td>

  <td>${t.l||0}</td>
  <td>${s.l||0}</td>
  <td>${pct(s.l,t.l)}%</td>
  <td class="${lr<=2?'rankTop':lr>=8?'rankLow':''}">${lr}</td>
  <td>${(s.l||0)-(s.prevL||0)}</td>

  <td>${s.r||0}</td>
  </tr>`

  sum.w+=s.w||0; sum.l+=s.l||0
  sum.tw+=t.w||0; sum.tl+=t.l||0
 })

function makeSum(name,list){
 let w=0,l=0,tw=0,tl=0,m=0,r=0
 let prevW=0, prevL=0

 list.forEach(c=>{
  let s=getData(c),t=targets[c]||{}
  w+=s.w||0; l+=s.l||0
  tw+=t.w||0; tl+=t.l||0
  m+=s.m||0; r+=s.r||0
  prevW+=s.prevW||0; prevL+=s.prevL||0
 })

 let diffW = w - prevW
 let diffL = l - prevL

 return `
 <tr class="group">
 <td></td><td>${name}</td>
 <td>${tw}</td><td>${w}</td><td>${pct(w,tw)}%</td>
 <td>-</td><td>${diffW}</td>
 <td>${m}</td><td>${ratio(m,w)}%</td>
 <td>${tl}</td><td>${l}</td><td>${pct(l,tl)}%</td>
 <td>-</td><td>${diffL}</td>
 <td>${r}</td>
 </tr>`
}

tb.innerHTML+=makeSum("강북도매 계",centers)
tb.innerHTML+=makeSum("강북상권 계",["서대문","의정부","고양","구리","노원","광진"])
tb.innerHTML+=makeSum("강원상권 계",["강릉","원주","춘천"])

 let wPct=sum.tw?Math.round(sum.w/sum.tw*100):0
 let lPct=sum.tl?Math.round(sum.l/sum.tl*100):0

 pw.innerText=wPct+"%"
 pl.innerText=lPct+"%"

 rw.style.left=trackPos(wPct)+"%"
 rl.style.left=trackPos(lPct)+"%"

 updateTime()
}

function loadData(){
 db.ref().on("value",snap=>{
  cache=snap.val()||{}
  render()
 })
}

function save(){
 let s=getData(cur)
 db.ref("c_"+cur).update({
  prevW:s.w||0,prevL:s.l||0,
  w:Number(w.value||0),
  m:Number(m.value||0),
  l:Number(l.value||0),
  r:Number(r.value||0),
  ts:Date.now()
 })
 popup.style.display="none"
}

async function loadTarget(){

 const res = await fetch("target.xlsx?t=" + Date.now())
 const data = await res.arrayBuffer()
 const wb = XLSX.read(data)

 const ws = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1, raw:false})
const ls = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[1]],{header:1, raw:false})
 const now = new Date()
const tDay = now.getDate()
const tMonth = now.getMonth() + 1

let col = -1
let header = ws[1]

const todayStr = `${tMonth}/${tDay}`

for(let i=0;i<header.length;i++){
  let v = header[i]
  if(!v) continue

  // 🔥 1순위: Date 객체
  if(v instanceof Date){
    let m = v.getMonth() + 1
    let d = v.getDate()

    if(m === tMonth && d === tDay){
      col = i
      break
    }
  }

  // 🔥 2순위: 문자열 fallback
  let txt = String(v).trim()
  if(txt === `${tMonth}/${tDay}`){
    col = i
    break
  }
}

 if(col === -1){
  alert("목표 날짜 매칭 실패")
  return
 }

 centers.forEach(c=>{
  let wr = ws.find(r=>r[0]===c)
  let lr = ls.find(r=>r[0]===c)

  targets[c] = {
    w: wr ? Number(wr[col] || 0) : 0,
    l: lr ? Number(lr[col] || 0) : 0
  }
 })

 targetLoaded = true
 render()
}

renderBtns()
loadTarget().then(loadData)

function makeSummary(){

 let now = new Date()
 let timeTxt = `${now.getMonth()+1}/${now.getDate()} ${now.getHours()}시 기준`

 let arr = centers.map(c=>{
   let s=getData(c), t=targets[c]||{}

   let w = s.w||0, l = s.l||0
   let tw = t.w||0, tl = t.l||0

   let wPct = tw ? w/tw*100 : 0
   let lPct = tl ? l/tl*100 : 0

   let diffW = (s.w||0)-(s.prevW||0)
   let diffL = (s.l||0)-(s.prevL||0)

   return {
     c,
     w, l, tw, tl,
     wPct: Math.round(wPct*10)/10,
     lPct: Math.round(lPct*10)/10,
     diffW, diffL
   }
 })

 // 정렬
 let wRank = [...arr].sort((a,b)=>b.wPct-a.wPct)
 let lRank = [...arr].sort((a,b)=>b.lPct-a.lPct)

 // 전체 합계
 let sumW = arr.reduce((a,b)=>a+b.w,0)
 let sumL = arr.reduce((a,b)=>a+b.l,0)
 let sumTW = arr.reduce((a,b)=>a+b.tw,0)
 let sumTL = arr.reduce((a,b)=>a+b.tl,0)

 let totalWPct = sumTW ? Math.round(sumW/sumTW*1000)/10 : 0
 let totalLPct = sumTL ? Math.round(sumL/sumTL*1000)/10 : 0

 // 전체 증분
 let totalDiffW = arr.reduce((a,b)=>a+b.diffW,0)
 let totalDiffL = arr.reduce((a,b)=>a+b.diffL,0)

 let text = `[강북도매 유/무선 실적 요약 - ${timeTxt}]\n\n`

 // 🔥 무선
 text += `■ 무선 (전체 ${totalWPct}%, +${totalDiffW}건)\n\n`

 wRank.forEach((x,i)=>{
   text += `${i+1}위 ${x.c}: ${x.wPct}% (${x.tw}건/${x.w}건/${x.diffW>=0?`+${x.diffW}`:x.diffW}건)\n`
 })

 text += `\nㅇ무선 전체: ${sumW-totalDiffW}→${sumW}건 (+${totalDiffW}건)\n\n`

 // 🔥 유선
 text += `■ 유선 (전체 ${totalLPct}%, +${totalDiffL}건)\n\n`

 lRank.forEach((x,i)=>{
   text += `${i+1}위 ${x.c}: ${x.lPct}% (${x.tl}건/${x.l}건/${x.diffL>=0?`+${x.diffL}`:x.diffL}건)\n`
 })

 text += `\nㅇ유선 전체: ${sumL-totalDiffL}→${sumL}건 (+${totalDiffL}건)\n\n`

 // 🔥 핵심 요약 (자동)
 let topDiff = [...arr].sort((a,b)=>b.diffW-a.diffW)[0]
 let topL = [...arr].sort((a,b)=>b.lPct-a.lPct)[0]
 let zeroL = arr.filter(x=>x.l===0)

 text += "■ 핵심 요약\n"
 text += `- 무선: ${topDiff.c} ${topDiff.diffW>0?`+${topDiff.diffW}건 최다 증가`:"변동 없음"}\n`
 text += `- 유선: ${topL.c} ${topL.lPct}% 최고 달성\n`

 if(zeroL.length){
   text += `- 유선 무실적: ${zeroL.map(x=>x.c).join(", ")}\n`
 }

 return text
}
 
// 🔥 여기부터 붙여넣기
async function sendTelegram(){

 // 🔒 비밀번호 체크
 let pw = prompt("비밀번호 입력")
 if(pw !== ADMIN_PW){
   alert("비밀번호 틀림")
   return
 }

 let allDone = centers.every(c=>{
   let s=getData(c)
   return signal(s.ts)==="green"
 })

 if(!allDone){
   alert("아직 완료 안된 센터 있음")
   return
 }

 let area = document.getElementById("captureArea")

let canvas = await html2canvas(area, {
  scale: 1,
  useCORS: true
})
// 🔥 안정 방식 (이걸로 바꿔)
let blob = await new Promise(resolve=>{
  canvas.toBlob(function(b){
    if(!b){
      alert("❌ 캡쳐 실패")
      return
    }
    resolve(b)
  })
})

 let summary = makeSummary()
 const TOKEN = "8779626080:AAFnBI12T_W4XeWgIo9c2BKwI8qXi1rqMOw"
 const CHAT_ID = "-1003313981993"
 let form = new FormData()
 form.append("chat_id", CHAT_ID)
 form.append("photo", blob, "result.png")

 let res = await fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto`,{
  method:"POST",
  body:form
})

let result = await res.json()
await fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`,{
  method:"POST",
  headers:{
    "Content-Type":"application/json"
  },
  body: JSON.stringify({
    chat_id: CHAT_ID,
    text: summary
  })
})
console.log(result)

if(result.ok){
  alert("✅ 텔레 전송 성공")
}else{
  alert("❌ 전송 실패")
  console.log(result)
}

}  // 🔥 이게 핵심 (sendTelegram 닫기)

</script>

</body>
</html>
