
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>강북도매 유/무선 실적 V17</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body{font-family:Arial;background:#f4f6fb;padding:20px;}
.topbar{display:flex;justify-content:flex-end;gap:10px;margin-bottom:10px;}
.centerGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:20px 0;max-width:420px;}
.centerGrid button{background:#eef1f7;font-weight:bold;padding:10px;border:1px solid #ccc;border-radius:6px;}
table{width:100%;border-collapse:collapse;margin-top:15px;font-size:13px;}
th{background:#0f2345;color:white;padding:8px;}
td{border-bottom:1px solid #ddd;padding:6px;text-align:center;}
.group{background:#eef3ff;font-weight:bold;}
.rankTop{background:#dbe9ff;}
.rankLow{background:#ffdede;}
.track{position:relative;height:18px;background:#e2e6f0;border-radius:10px;margin:10px 0;}
.finish{position:absolute;right:0;width:4px;height:100%;background:red;}
.runner{position:absolute;top:-4px;font-size:20px;}
.popup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
background:white;padding:20px;border-radius:10px;display:none;}
.popup input{width:150px;margin-bottom:8px;padding:6px;}
</style>
</head>

<body>

<div class="topbar">
<button onclick="resetData()">초기화</button>
<button onclick="location.href='index.html'">메인포털</button>
</div>

<h2>강북도매 유/무선 실적</h2>

<div class="centerGrid">
<button onclick="openCenter('서대문')">서대문</button>
<button onclick="openCenter('의정부')">의정부</button>
<button onclick="openCenter('고양')">고양</button>
<button onclick="openCenter('구리')">구리</button>
<button onclick="openCenter('노원')">노원</button>
<button onclick="openCenter('광진')">광진</button>
<button onclick="openCenter('강릉')">강릉</button>
<button onclick="openCenter('원주')">원주</button>
<button onclick="openCenter('춘천')">춘천</button>
</div>

<table id="tbl">
<thead>
<tr>
<th>완료</th><th>센터</th>
<th>무선목표</th><th>무선실적</th><th>달성율</th><th>순위</th><th>증분</th>
<th>MNP</th><th>비중</th><th>중고</th><th>비중</th>
<th>유선목표</th><th>유선실적</th><th>달성율</th><th>순위</th><th>증분</th>
<th>약갱</th>
</tr>
</thead>
<tbody></tbody>
</table>

<h3>강북도매 달성율 트랙</h3>
<div>무선</div>
<div class="track"><div class="finish"></div><div id="r1" class="runner">🏃‍➡️ 0%</div></div>
<div>유선</div>
<div class="track"><div class="finish"></div><div id="r2" class="runner">🏃‍➡️ 0%</div></div>

<div class="popup" id="popup">
<h3 id="pTitle"></h3>
<input id="w" placeholder="무선">
<input id="m" placeholder="MNP">
<input id="u" placeholder="중고">
<input id="l" placeholder="유선">
<input id="r" placeholder="약갱">
<button onclick="save()">저장</button>
<button onclick="popup.style.display='none'">닫기</button>
</div>

<script>

const centers=["서대문","의정부","고양","구리","노원","광진","강릉","원주","춘천"]
const gangbuk=["서대문","의정부","고양","구리","노원","광진"]
const gangwon=["강릉","원주","춘천"]

let targets={}

function today(){
let d=new Date()
return (d.getMonth()+1)+"/"+d.getDate()
}

async function loadTargets(){
let res=await fetch("target.xlsx")
let buf=await res.arrayBuffer()
let wb=XLSX.read(buf)

let s1=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1})
let s2=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[1]],{header:1})

let t=today()

let col=-1
s1.forEach(row=>{
row.forEach((v,i)=>{
if(String(v).trim()==t){col=i}
})
})

centers.forEach(c=>{
let r1=s1.find(r=>r.includes(c))
let r2=s2.find(r=>r.includes(c))

targets[c]={
w:r1?Number(r1[col]||0):0,
l:r2?Number(r2[col]||0):0
}
})

render()
}

function sumGroup(list){
let obj={w:0,l:0,m:0,u:0,r:0}
list.forEach(c=>{
let s=JSON.parse(localStorage.getItem("c_"+c)||"{}")
obj.w+=Number(s.w||0)
obj.l+=Number(s.l||0)
obj.m+=Number(s.m||0)
obj.u+=Number(s.u||0)
obj.r+=Number(s.r||0)
})
return obj
}

function render(){
let tb=document.querySelector("#tbl tbody")
tb.innerHTML=""

let g1=sumGroup(centers)
let g2=sumGroup(gangbuk)
let g3=sumGroup(gangwon)

function row(name,data){
return `<tr class="group">
<td></td><td>${name}</td>
<td>-</td><td>${data.w}</td><td>-</td><td>-</td><td>-</td>
<td>${data.m}</td><td>-</td><td>${data.u}</td><td>-</td>
<td>-</td><td>${data.l}</td><td>-</td><td>-</td><td>-</td>
<td>${data.r}</td>
</tr>`
}

tb.innerHTML+=row("강북도매계",g1)
tb.innerHTML+=row("강북상권계",g2)
tb.innerHTML+=row("강원상권계",g3)

centers.forEach(c=>{
let s=JSON.parse(localStorage.getItem("c_"+c)||"{}")
let w=s.w||0,l=s.l||0,m=s.m||0,u=s.u||0,r=s.r||0
let wt=targets[c]?.w||0
let lt=targets[c]?.l||0
let wa=wt?Math.round(w/wt*100):0
let la=lt?Math.round(l/lt*100):0

tb.innerHTML+=`
<tr>
<td>${w||l?"✔️":""}</td>
<td>${c}</td>
<td>${wt}</td><td>${w}</td><td>${wa}%</td>
<td>-</td><td>-</td>
<td>${m}</td><td>${w?Math.round(m/w*100):0}%</td>
<td>${u}</td><td>${w?Math.round(u/w*100):0}%</td>
<td>${lt}</td><td>${l}</td><td>${la}%</td>
<td>-</td><td>-</td>
<td>${r}</td>
</tr>`
})

}

let cur=""
function openCenter(c){
cur=c
let s=JSON.parse(localStorage.getItem("c_"+c)||"{}")
w.value=s.w||""
m.value=s.m||""
u.value=s.u||""
l.value=s.l||""
r.value=s.r||""
pTitle.innerText=c
popup.style.display="block"
}

function save(){
localStorage.setItem("c_"+cur,JSON.stringify({
w:w.value,m:m.value,u:u.value,l:l.value,r:r.value
}))
popup.style.display="none"
render()
}

function resetData(){
localStorage.clear()
location.reload()
}

loadTargets()

</script>
</body>
</html>
