<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>강북도매 유/무선 실적 V20 (최종)</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<style>
body{font-family:Arial;background:#f4f6fb;padding:20px;}
.topbar{display:flex;justify-content:flex-end;gap:10px;}
.centerGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:20px 0;max-width:420px;}
.centerGrid button{padding:10px;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{background:#0f2345;color:white;padding:8px;}
td{border-bottom:1px solid #ddd;padding:6px;text-align:center;}
.group{background:#eef3ff;font-weight:bold;}
.rankTop{background:#dbe9ff;}
.rankLow{background:#ffdede;}
.track{position:relative;height:18px;background:#e2e6f0;border-radius:10px;margin:10px 0;}
.finish{position:absolute;right:0;width:4px;height:100%;background:red;}
.runner{position:absolute;top:-4px;}
.popup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:white;padding:20px;display:none;}
.popup input{width:120px;margin-bottom:6px;}
</style>
</head>
<body>

<div class="topbar">
<button onclick="resetData()">초기화</button>
<button onclick="location.href='index.html'">메인가기</button>
</div>

<h2>강북도매 유/무선 실적 (최종 공유)</h2>

<div class="centerGrid" id="grid"></div>

<table>
<thead>
<tr>
<th>센터</th><th>무선</th><th>유선</th>
</tr>
</thead>
<tbody id="body"></tbody>
</table>

<script>

// Firebase config 입력
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  databaseURL: "YOUR_DB_URL",
  projectId: "YOUR_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const centers=["서대문","의정부","고양","구리","노원","광진","강릉","원주","춘천"]

let data={}

function init(){
 let g=document.getElementById("grid")
 centers.forEach(c=>{
  let b=document.createElement("button")
  b.innerText=c
  b.onclick=()=>open(c)
  g.appendChild(b)
 })

 db.ref("centers").on("value",snap=>{
  data=snap.val()||{}
  render()
 })
}

function render(){
 let b=document.getElementById("body")
 b.innerHTML=""
 centers.forEach(c=>{
  let d=data[c]||{}
  b.innerHTML+=`<tr>
  <td>${c}</td>
  <td>${d.w||0}</td>
  <td>${d.l||0}</td>
  </tr>`
 })
}

let cur=""
function open(c){
 let w=prompt(c+" 무선 입력")
 let l=prompt(c+" 유선 입력")
 db.ref("centers/"+c).set({
  w:Number(w||0),
  l:Number(l||0)
 })
}

function resetData(){
 db.ref("centers").set(null)
}

init()

</script>

</body>
</html>
