<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>강북도매 유/무선 실적</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<style>
body{font-family:Arial;background:#fff;padding:20px;color:#111;font-weight:500;}

.topbar{display:flex;gap:8px;margin-bottom:10px;}
button{padding:8px 12px;border-radius:6px;border:1px solid #ccc;background:#eef1f7;font-weight:600;}

.centerGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:15px 0;}
.centerGrid button{background:#1e3a8a;color:#fff;border:none;}

table{width:100%;border-collapse:collapse;font-size:16px;}
th,td{text-align:center;vertical-align:middle;}
th{background:#0f2345;color:#fff;padding:14px;font-weight:700;white-space:nowrap;}
td{padding:10px;border-bottom:1px solid #ddd;font-weight:600;white-space:nowrap;}

.rankTop{background:#dbeafe;}
.rankLow{background:#fee2e2;}

.signal{width:12px;height:12px;border-radius:50%;margin:auto;}
.green{background:#22c55e;}
.yellow{background:#facc15;}
.red{background:#ef4444;}

.track{height:40px;background:#ddd;border-radius:20px;position:relative;margin:12px 0;}
.finish{position:absolute;left:66%;top:0;bottom:0;width:6px;background:repeating-linear-gradient(45deg,black,black 5px,white 5px,white 10px);}

.runner{
 position:absolute;
 top:-20px;
 display:flex;
 flex-direction:column;
 align-items:center;
 font-size:26px;
}

.runner span{
 font-size:20px;
 font-weight:bold;
}

canvas{margin-top:30px;}

.popup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
background:white;padding:20px;border-radius:10px;display:none;}
input{width:120px;margin:4px 0;padding:6px;}
</style>
</head>

<body>

<div class="topbar">
<button onclick="location.href='index.html'">메인가기</button>
<button onclick="location.reload()">새로고침</button>
<button onclick="adminReset()">초기화</button>
</div>

<div class="centerGrid" id="btns"></div>

<h2>강북도매 유/무선 실적</h2>
<h3 id="titleTime"></h3>

<table id="tbl">
<thead>
<tr>
<th></th><th>센터</th>
<th>무선목표</th><th>무선</th><th>달성율</th><th>순위</th><th>증분</th>
<th>MNP</th><th>비중</th>
<th>중고</th><th>비중</th>
<th>유선목표</th><th>유선</th><th>달성율</th><th>순위</th><th>증분</th>
<th>약갱</th>
</tr>
</thead>
<tbody></tbody>
</table>

<h3>진행 트랙</h3>

<div>무선</div>
<div class="track">
<div class="finish"></div>
<div id="rw" class="runner"><span id="pw"></span>🏃‍➡️</div>
</div>

<div>유선</div>
<div class="track">
<div class="finish"></div>
<div id="rl" class="runner"><span id="pl"></span>🏃‍➡️</div>
</div>

<h3>센터별 달성률 비교</h3>
<canvas id="chart"></canvas>

<div class="popup" id="popup">
<h3 id="pTitle"></h3>
<input id="w" placeholder="무선">
<input id="m" placeholder="MNP">
<input id="u" placeholder="중고">
<input id="l" placeholder="유선">
<input id="r" placeholder="약갱">
<br><button onclick="save()">저장</button>
</div>

<script>
const centers=["서대문","의정부","고양","구리","노원","광진","강릉","원주","춘천"]

let cache={},targets={},cur=""
let targetLoaded=false
let chart

firebase.initializeApp({
 databaseURL:"https://sales-dashboard-e7a79-default-rtdb.firebaseio.com"
})
const db=firebase.database()

function pct(a,b){
 if(!a||!b) return 0
 return Math.round(a/b*100)
}

function signal(ts){
 if(!ts) return "red"
 let diff=(Date.now()-ts)/60000
 if(diff<60) return "green"
 if(diff<120) return "yellow"
 return "red"
}

function trackPos(p){
 if(p<=100) return (p/100)*66
 else return 66+Math.min(p-100,100)/100*34
}

function updateTime(){
 let n=new Date()
 titleTime.innerText=`${n.getMonth()+1}월 ${n.getDate()}일 ${n.getHours()}시 기준`
}

function adminReset(){
 let pw=prompt("비번")
 if(pw!=="2330") return
 centers.forEach(c=>{
  db.ref("c_"+c).update({w:0,m:0,u:0,l:0,r:0,prevW:0,prevL:0,ts:0})
 })
}

function getData(c){return cache["c_"+c]||{}}

function render(){
 if(!targetLoaded) return
 let tb=document.querySelector("#tbl tbody")
 tb.innerHTML=""

 let wData=[],lData=[]

 centers.forEach(c=>{
  let s=getData(c),t=targets[c]||{}
  let wPct=pct(s.w,t.w)
  let lPct=pct(s.l,t.l)

  wData.push(wPct)
  lData.push(lPct)

  tb.innerHTML+=`
  <tr>
  <td><div class="signal ${signal(s.ts)}"></div></td>
  <td>${c}</td>
  <td>${t.w||0}</td><td>${s.w||0}</td><td>${wPct}%</td>
  <td></td>
  <td>${(s.w||0)-(s.prevW||0)}</td>
  <td>${s.m||0}</td><td></td>
  <td>${s.u||0}</td><td></td>
  <td>${t.l||0}</td><td>${s.l||0}</td><td>${lPct}%</td>
  <td></td>
  <td>${(s.l||0)-(s.prevL||0)}</td>
  <td>${s.r||0}</td>
  </tr>`
 })

 drawChart(wData,lData)
 updateTime()
}

function drawChart(w,l){
 if(chart) chart.destroy()

 chart=new Chart(document.getElementById("chart"),{
  type:"bar",
  data:{
   labels:centers,
   datasets:[
    {label:"무선",data:w},
    {label:"유선",data:l}
   ]
  },
  options:{
   responsive:true,
   plugins:{legend:{position:"top"}}
  }
 })
}

function loadData(){
 db.ref().on("value",snap=>{
  cache=snap.val()||{}
  render()
 })
}

async function loadTarget(){
 const res=await fetch("target.xlsx")
 const data=await res.arrayBuffer()
 const wb=XLSX.read(data)
 const ws=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1})

 const today=new Date().getDate()
 let col=ws[0].findIndex(v=>String(v).includes("/"+today))

 centers.forEach(c=>{
  let row=ws.find(r=>r[0]===c)
  targets[c]={w:row?Number(row[col]||0):0,l:0}
 })

 targetLoaded=true
 render()
}

renderBtns()
loadTarget().then(loadData)
</script>

</body>
</html>
