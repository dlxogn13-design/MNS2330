
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>유무선 실적</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
</head>
<body>

<div class="nav">
<button class="navBtn" onclick="location.href='index.html'">🏠 메인</button>
<button class="navBtn" onclick="history.back()">← 뒤로</button>
</div>

<h2 id="title"></h2>

<table id="summary">
<thead>
<tr>
<th>완료</th>
<th>센터</th>
<th>무선목표</th>
<th>무선실적</th>
<th>증분</th>
<th>달성율</th>
<th>MNP</th>
<th>중고</th>
<th>유선목표</th>
<th>유선실적</th>
<th>증분</th>
<th>달성율</th>
<th>약갱</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>

const centers=["서대문","의정부","고양","구리","노원","광진","강릉","원주","춘천"]
const gangbuk=["서대문","의정부","고양","구리","노원","광진"]
const gangwon=["강릉","원주","춘천"]

document.getElementById("title").innerText="강북도매 유/무선 실적 "+new Date().getHours()+"시 기준"

function resetCheck(){

let today=new Date().toISOString().slice(0,10)
let savedDate=localStorage.getItem("portal_date")

if(savedDate!==today){
localStorage.clear()
localStorage.setItem("portal_date",today)
}

}

async function loadTargets(){

const file=await fetch("target.xlsx")
const data=await file.arrayBuffer()
const wb=XLSX.read(data)

const wSheet=XLSX.utils.sheet_to_json(wb.Sheets["무선목표"])
const lSheet=XLSX.utils.sheet_to_json(wb.Sheets["유선목표"])

let today=new Date()
let key=(today.getMonth()+1)+"/"+today.getDate()

let targets={}

wSheet.forEach(r=>{
Object.keys(r).forEach(c=>{
if(c.includes(key)){
targets[r.센터]={w:r[c]}
}
})
})

lSheet.forEach(r=>{
Object.keys(r).forEach(c=>{
if(c.includes(key)){
if(!targets[r.센터]) targets[r.센터]={}
targets[r.센터].l=r[c]
}
})
})

return targets

}

function rate(v,t){
if(!t) return "0%"
return ((v/t)*100).toFixed(1)+"%"
}

async function load(){

resetCheck()

let targets=await loadTargets()

let html=""

let totalW=0,totalL=0
let gbW=0,gbL=0
let gwW=0,gwL=0

centers.forEach(c=>{

let d=JSON.parse(localStorage.getItem(c)||"{}")

let w=d.w||0
let l=d.l||0

totalW+=w
totalL+=l

if(gangbuk.includes(c)){gbW+=w;gbL+=l}
if(gangwon.includes(c)){gwW+=w;gwL+=l}

})

html+=`
<tr class="sumRow">
<td>-</td>
<td>강북도매</td>
<td>-</td>
<td>${totalW}</td>
<td>-</td>
<td>-</td>
<td>-</td>
<td>-</td>
<td>-</td>
<td>${totalL}</td>
<td>-</td>
<td>-</td>
<td>-</td>
</tr>`

html+=`
<tr class="sumRow">
<td>-</td>
<td>강북상권</td>
<td>-</td>
<td>${gbW}</td>
<td>-</td>
<td>-</td>
<td>-</td>
<td>-</td>
<td>-</td>
<td>${gbL}</td>
<td>-</td>
<td>-</td>
<td>-</td>
</tr>`

html+=`
<tr class="sumRow">
<td>-</td>
<td>강원상권</td>
<td>-</td>
<td>${gwW}</td>
<td>-</td>
<td>-</td>
<td>-</td>
<td>-</td>
<td>-</td>
<td>${gwL}</td>
<td>-</td>
<td>-</td>
<td>-</td>
</tr>`

centers.forEach(c=>{

let d=JSON.parse(localStorage.getItem(c)||"{}")

let w=d.w||0
let prevW=d.prevW||0
let incW=w-prevW

let l=d.l||0
let prevL=d.prevL||0
let incL=l-prevL

let m=d.m||0
let u=d.u||0
let r=d.r||0

let tW=targets[c]?.w||0
let tL=targets[c]?.l||0

let done=(w||m||u||l||r)?"✔":""

html+=`
<tr>
<td>${done}</td>
<td>${c}</td>
<td>${tW}</td>
<td>${w}</td>
<td>${incW}</td>
<td>${rate(w,tW)}</td>
<td>${m}</td>
<td>${u}</td>
<td>${tL}</td>
<td>${l}</td>
<td>${incL}</td>
<td>${rate(l,tL)}</td>
<td>${r}</td>
</tr>`

})

document.querySelector("#summary tbody").innerHTML=html

}

load()

</script>

</body>
</html>
