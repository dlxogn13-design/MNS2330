<body>

<h2>강북도매 유/무선 실적</h2>

<table id="tbl">
<thead>
<tr>
<th>센터</th>
<th>무선목표</th><th>무선</th><th>달성%</th>
<th>유선목표</th><th>유선</th><th>달성%</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>
const centers=["서대문","의정부","고양","구리","노원","광진","강릉","원주","춘천"]
let targets={}
let cache={}

function percent(a,b){
 if(!b) return "0%"
 return Math.round((a/b)*100)+"%"
}

async function loadTarget(){
 const res = await fetch("target.xlsx")
 const data = await res.arrayBuffer()
 const workbook = XLSX.read(data)

 let today = new Date().getDate()
 let colName = "3/"+today

 let wsW = workbook.Sheets[workbook.SheetNames[0]]
 let wsL = workbook.Sheets[workbook.SheetNames[1]]

 let jsonW = XLSX.utils.sheet_to_json(wsW,{header:1})
 let jsonL = XLSX.utils.sheet_to_json(wsL,{header:1})

 let colIndex = jsonW[0].indexOf(colName)

 centers.forEach((c,i)=>{
  targets[c]={
   w: jsonW[i+1][colIndex]||0,
   l: jsonL[i+1][colIndex]||0
  }
 })

 loadData()
}

function getData(c){return cache["c_"+c]||{}}

function render(){
 let tb=document.querySelector("#tbl tbody")
 tb.innerHTML=""

 centers.forEach(c=>{
  let s=getData(c)
  let t=targets[c]||{w:0,l:0}

  let w=Number(s.w||0)
  let l=Number(s.l||0)

  tb.innerHTML+=`
  <tr>
  <td>${c}</td>
  <td>${t.w}</td><td>${w}</td><td>${percent(w,t.w)}</td>
  <td>${t.l}</td><td>${l}</td><td>${percent(l,t.l)}</td>
  </tr>`
 })
}

function loadData(){
 db.ref().on("value",snap=>{
  cache=snap.val()||{}
  render()
 })
}

loadTarget()
</script>

</body>
