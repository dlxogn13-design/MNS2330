
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>KTm&s 재고 검색</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body{
font-family:Arial;
background:linear-gradient(#e6f4ff,#ffffff);
padding:20px;
}

.container{
max-width:720px;
margin:auto;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.header{
display:flex;
align-items:center;
gap:10px;
margin-bottom:10px;
}

.logo{
height:40px;
}

.title{
font-size:22px;
font-weight:bold;
}

.update{
background:#fff5c2;
padding:8px;
border-radius:6px;
text-align:center;
margin-bottom:10px;
font-size:14px;
}

.total{
font-size:22px;
color:#1b7bdc;
text-align:center;
margin:10px 0;
font-weight:bold;
}

.searchbox input{
width:100%;
padding:12px;
margin:6px 0;
border-radius:6px;
border:1px solid #ddd;
box-sizing:border-box;
}

button{
width:100%;
padding:12px;
background:#3a7be0;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

.section{margin-top:20px}

.item{
padding:10px;
border-bottom:1px solid #eee;
cursor:pointer;
}

.item:hover{background:#f1f7ff}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
border:1px solid #ccc;
padding:8px;
text-align:center;
}

th{
background:#2f3640;
color:white;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<img src="logo.png" class="logo">
<div class="title">KTm&s 재고 검색 🔍</div>
</div>

<div class="update" id="updateTime">재고 업데이트 : 확인중...</div>
<div class="total" id="totalCount">총 재고 : 0</div>

<div class="searchbox">
<input id="model" placeholder="모델 검색 (예: 942, S942)">
<input id="color" placeholder="색상 검색">
<input id="branch" placeholder="지사 검색">
<input id="store" placeholder="점명 검색">
<button onclick="search()">검색</button>
</div>

<div class="section">
<h3>모델 검색 결과</h3>
<div id="modelList"></div>
</div>

<div class="section">
<h3>지사별 재고 많은 점 TOP10</h3>
<div id="top10"></div>
</div>

<div class="section">
<h3>검색 결과</h3>

<table>
<thead>
<tr>
<th>지사</th>
<th>점명</th>
<th>모델</th>
<th>수량</th>
<th>자타사</th>
</tr>
</thead>
<tbody id="resultBody"></tbody>
</table>

</div>

</div>

<script>

let data=[]
let filtered=[]

const repoOwner="dlxogn13-design"
const repoName="MNS2330"

async function loadUpdateTime(){

try{

const res = await fetch(
`https://api.github.com/repos/${repoOwner}/${repoName}/commits?path=inventory.xlsx&per_page=1`
)

const json = await res.json()

const time = json[0].commit.committer.date

const d = new Date(time)

document.getElementById("updateTime").innerText =
"재고 업데이트 : "+ d.toLocaleString()

}catch(e){

document.getElementById("updateTime").innerText =
"재고 업데이트 : 확인 불가"

}

}

async function loadInventory(){

const response=await fetch("./inventory.xlsx")
const buffer=await response.arrayBuffer()

const workbook=XLSX.read(buffer)
const sheet=workbook.Sheets[workbook.SheetNames[0]]

data=XLSX.utils.sheet_to_json(sheet)

}

loadInventory()
loadUpdateTime()

function normalizeColor(c){

if(!c) return ""

c=c.toLowerCase()

if(c.includes("퍼플") || c.includes("바이올렛")) return "purple"

return c

}

function matchModel(input, modelName){

if(!input) return true

input=input.toUpperCase()

if(modelName.toUpperCase().includes(input)) return true

if(/^[0-9]+$/.test(input)){
if(modelName.includes("S"+input)) return true
if(modelName.includes("A"+input)) return true
if(modelName.includes("M"+input)) return true
}

return false

}

function search(){

const model=document.getElementById("model").value.trim()
const color=normalizeColor(document.getElementById("color").value)
const branch=document.getElementById("branch").value
const store=document.getElementById("store").value

filtered=[]
let modelMap={}
let branchMap={}
let total=0

data.forEach(r=>{

const m=r["모델명"]||""
const qty=Number(r["수량"]||0)
const br=r["지사명"]||""
const st=r["점명"]||""

if(qty<1) return

if(!matchModel(model,m)) return
if(branch && !br.includes(branch)) return
if(store && !st.includes(store)) return

if(color){
let mc=normalizeColor(m)
if(!mc.includes(color)) return
}

filtered.push(r)

if(!modelMap[m]) modelMap[m]=0
modelMap[m]+=qty

const key=br+"-"+st

if(!branchMap[key]) branchMap[key]={branch:br,store:st,total:0}

branchMap[key].total+=qty

total+=qty

})

document.getElementById("totalCount").innerText="총 재고 : "+total

renderModelList(modelMap)
renderTop10(branchMap)
renderTable()

}

function renderModelList(map){

let html=""

Object.keys(map).forEach(m=>{

html+=`<div class="item">${m} : ${map[m]}대</div>`

})

document.getElementById("modelList").innerHTML=html

}

function renderTop10(map){

let list=Object.values(map)

let branchGroup={}

list.forEach(r=>{

if(!branchGroup[r.branch]) branchGroup[r.branch]=[]

branchGroup[r.branch].push(r)

})

let html=""

Object.keys(branchGroup).forEach(br=>{

let sorted=branchGroup[br]
.sort((a,b)=>b.total-a.total)
.slice(0,10)

html+=`<b>${br}</b>`

sorted.forEach(s=>{

html+=`
<div class="item" onclick="openDetail('${s.branch}','${s.store}')">
${s.store} : ${s.total}대
</div>`

})

})

document.getElementById("top10").innerHTML=html

}

function renderTable(){

let tbody=document.getElementById("resultBody")

tbody.innerHTML=""

filtered.forEach(r=>{

tbody.innerHTML+=`
<tr>
<td>${r["지사명"]}</td>
<td>${r["점명"]}</td>
<td>${r["모델명"]}</td>
<td>${r["수량"]}</td>
<td>${r["자/타사구분"]}</td>
</tr>
`

})

}

function openDetail(branch,store){

let rows=filtered.filter(r =>
r["지사명"]===branch && r["점명"]===store
)

let html=`
<html>
<head>
<title>점 재고 상세</title>
<style>
body{font-family:Arial;padding:20px}
table{width:100%;border-collapse:collapse}
th,td{border:1px solid #ccc;padding:8px;text-align:center}
th{background:#2f3640;color:white}
</style>
</head>
<body>

<h2>${branch} / ${store} 재고</h2>

<table>
<tr>
<th>지사</th>
<th>점명</th>
<th>모델</th>
<th>수량</th>
<th>자타사</th>
</tr>
`

rows.forEach(r=>{

html+=`
<tr>
<td>${r["지사명"]}</td>
<td>${r["점명"]}</td>
<td>${r["모델명"]}</td>
<td>${r["수량"]}</td>
<td>${r["자/타사구분"]}</td>
</tr>
`

})

html+=`
</table>
</body>
</html>
`

let win=window.open("","_blank")

win.document.write(html)

win.document.close()

}

</script>

</body>
</html>
