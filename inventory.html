
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>KTm&s 재고 검색</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
</head>
<body>

<div class="nav">
<button onclick="location.href='index.html'">🏠 메인</button>
</div>

<h2>KTm&s 재고 검색 🔎</h2>

<div class="inventory-box">
<input id="model" placeholder="모델 검색">
<button onclick="search()">검색</button>
</div>

<div id="result"></div>

<script>
async function search(){
const file=await fetch("inventory.xlsx")
const data=await file.arrayBuffer()
const wb=XLSX.read(data)
const sheet=wb.Sheets[wb.SheetNames[0]]
const rows=XLSX.utils.sheet_to_json(sheet)

let key=document.getElementById("model").value
let html="<table><tr><th>지사</th><th>점명</th><th>모델</th><th>수량</th><th>자사</th></tr>"

rows.forEach(r=>{
if(r.모델 && r.모델.toString().includes(key)){
html+=`<tr>
<td>${r.지사||""}</td>
<td>${r.점명||""}</td>
<td>${r.모델||""}</td>
<td>${r.수량||""}</td>
<td>${r.자사||""}</td>
</tr>`
}
})

html+="</table>"
document.getElementById("result").innerHTML=html
}
</script>

</body>
</html>
